<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<div class="wrap">
  <div class="badge">
    <div class="dot"></div>
    <span>Attendance System</span>
  </div>

  <div class="box">
    <p class="eyebrow">Welcome back</p>
    <h2>Sign in</h2>
    <p class="sub">Access your dashboard based on your assigned role.</p>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@college.edu" autocomplete="email" />
    </div>

    <div class="field">
      <label for="pass">Password</label>
      <input type="password" id="pass" placeholder="Your password" autocomplete="current-password" />
    </div>

    <button id="btn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="label">Sign in</span>
    </button>

    <div id="msg"></div>
  </div>

  <p class="footer">First time? <a href="signup.html">Create admin account</a></p>
</div>

<script>
  const API = "https://attendance-version-1.vercel.app";

  // Redirect map — role → dashboard page
  const DASH = {
    admin:           "admin.html",
    hod:             "hod.html",
    class_teacher:   "attendance.html",
    subject_teacher: "attendance.html"
  };

  // If already logged in, go straight to dashboard
  (async () => {
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");
    if (token && role && DASH[role]) window.location.href = DASH[role];
  })();

  async function doLogin() {
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("pass").value;
    const btn   = document.getElementById("btn");

    document.getElementById("msg").innerHTML = "";
    ["email", "pass"].forEach(id => document.getElementById(id).classList.remove("error"));

    if (!email.includes("@")) return mark("email", "Enter a valid email.");
    if (!pass)                 return mark("pass",  "Password is required.");

    btn.classList.add("loading");
    btn.disabled = true;

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();

      if (!res.ok) return showMsg(data.error || "Login failed.", "err");

      localStorage.setItem("token",        data.token);
      localStorage.setItem("name",         data.name);
      localStorage.setItem("role",         data.role);
      localStorage.setItem("departmentId", data.departmentId || "");

      showMsg(`Welcome, ${data.name}. Redirecting…`, "ok");
      setTimeout(() => window.location.href = DASH[data.role] || "login.html", 1200);
    } catch {
      showMsg("Could not reach server. Check your connection.", "err");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  }

  function mark(id, msg) {
    document.getElementById(id).classList.add("error");
    showMsg(msg, "err");
  }

  function showMsg(text, type) {
    document.getElementById("msg").innerHTML = `<div class="msg ${type}">${text}</div>`;
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
