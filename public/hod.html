<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOD Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; border-bottom: 1px solid #1f1f1f;
      position: sticky; top: 0; background: #0d0d0d; z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .nav-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #555; }
    .nav-dept  { font-size: 13px; color: #888; }
    .btn-logout { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #444; background: none; border: 1px solid #222; border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: all .15s; }
    .btn-logout:hover { color: #f87171; border-color: #3a1515; }

    .page { max-width: 1060px; margin: 0 auto; padding: 32px 24px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: #111; border-radius: 10px; padding: 4px; }
    .tab { flex: 1; padding: 9px; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #555; border-radius: 7px; cursor: pointer; transition: all .15s; border: none; background: none; }
    .tab.active { background: #1e1e1e; color: #fff; }

    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .sec-title { font-size: 15px; font-weight: 400; color: #ccc; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters select {
      padding: 7px 12px; font-size: 12px; font-family: 'DM Mono', monospace;
      background: #111; color: #888; border: 1px solid #222; border-radius: 7px;
      outline: none; cursor: pointer; transition: border-color .15s; letter-spacing: .04em;
    }
    .filters select:focus { border-color: #444; color: #fff; }
    .filters select option { background: #1a1a1a; }

    .card { background: #111; border: 1px solid #1f1f1f; border-radius: 10px; padding: 20px; margin-bottom: 12px; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #444; }
    .field input, .field select {
      padding: 10px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      background: #0d0d0d; color: #fff; border: 1px solid #2a2a2a; border-radius: 7px;
      outline: none; transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-color: #444; }
    .field input::placeholder { color: #333; }
    .field select option { background: #1a1a1a; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    @media(max-width:640px){ .form-grid,.form-grid.three { grid-template-columns: 1fr; } }

    .btn { padding: 10px 18px; border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: #fff; color: #0d0d0d; }
    .btn-primary:hover { background: #d8d8d8; }
    .btn-sm { padding: 6px 12px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .06em; border-radius: 6px; cursor: pointer; border: none; }
    .btn-danger { background: #1f0d0d; color: #f87171; border: 1px solid #3a1515; }
    .btn-danger:hover { background: #2a1010; }
    .btn-ghost { background: #161616; color: #888; border: 1px solid #2a2a2a; }
    .btn-ghost:hover { color: #fff; border-color: #444; }
    .btn-add { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; background: #161616; color: #888; border: 1px solid #2a2a2a; border-radius: 7px; padding: 8px 14px; cursor: pointer; transition: all .15s; }
    .btn-add:hover { color: #fff; border-color: #444; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #444; text-align: left; padding: 10px 12px; border-bottom: 1px solid #1f1f1f; }
    .tbl td { padding: 12px 12px; font-size: 13px; color: #bbb; border-bottom: 1px solid #161616; vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #131313; }

    .pill { display: inline-block; padding: 2px 8px; font-family: 'DM Mono', monospace; font-size: 10px; border-radius: 4px; letter-spacing: .06em; }
    .pill-green  { background: #0a1f12; color: #4ade80; border: 1px solid #173325; }
    .pill-yellow { background: #1a1400; color: #fbbf24; border: 1px solid #3d2e00; }
    .pill-blue   { background: #0d1520; color: #60a5fa; border: 1px solid #1a3050; }
    .pill-purple { background: #130d20; color: #a78bfa; border: 1px solid #2a1a50; }

    .msg { padding: 10px 14px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.6; margin-top: 12px; }
    .ok  { color: #4ade80; background: #0a1a10; border: 1px solid #173325; }
    .err { color: #f87171; background: #1a0a0a; border: 1px solid #3a1515; }

    .empty { text-align: center; padding: 40px; color: #333; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display: flex; }
    .modal { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 28px; width: 100%; max-width: 460px; animation: up .25s ease; max-height: 90vh; overflow-y: auto; }
    @keyframes up { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 16px; font-weight: 400; }
    .modal-close { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; }
    .modal-close:hover { color: #fff; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; width: 100%; }
    .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #555; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; }
    .pw-toggle:hover { color: #fff; }

    .divider { height: 1px; background: #1f1f1f; margin: 16px 0; }

    /* subject type toggle */
    .type-toggle { display: flex; gap: 6px; }
    .type-btn { flex: 1; padding: 9px; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .08em; border-radius: 7px; cursor: pointer; border: 1px solid #2a2a2a; background: #0d0d0d; color: #555; transition: all .15s; }
    .type-btn.active { border-color: #60a5fa; color: #60a5fa; background: #0d1520; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-dot"></div>
    <span class="nav-title">HOD</span>
  </div>
  <span class="nav-dept" id="navDept">—</span>
  <button class="btn-logout" onclick="logout()">Sign out</button>
</nav>

<div class="page">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('subjects')">Subjects</button>
    <button class="tab"        onclick="switchTab('teachers')">Teachers</button>
  </div>

  <!-- ════ SUBJECTS TAB ════ -->
  <div id="tab-subjects">
    <div class="sec-head">
      <span class="sec-title">Subjects</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="filters">
          <select id="fYear"     onchange="loadSubjects()"><option value="">All Years</option></select>
          <select id="fSem"      onchange="loadSubjects()"><option value="">All Sems</option><option value="1">Sem 1</option><option value="2">Sem 2</option></select>
          <select id="fDiv"      onchange="loadSubjects()"><option value="">All Divs</option></select>
        </div>
        <button class="btn-add" onclick="openSubjectModal()">+ Add Subject</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr><th>Subject</th><th>Year / Sem</th><th>Division</th><th>Type</th><th>Teacher</th><th></th></tr>
        </thead>
        <tbody id="subjectBody">
          <tr><td colspan="6"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ════ TEACHERS TAB ════ -->
  <div id="tab-teachers" style="display:none;">
    <div class="sec-head">
      <span class="sec-title">Teachers</span>
      <button class="btn-add" onclick="openTeacherModal()">+ Add Teacher</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Role</th><th>Assigned Subjects</th><th></th></tr>
        </thead>
        <tbody id="teacherBody">
          <tr><td colspan="5"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ════ ADD SUBJECT MODAL ════ -->
<div class="overlay" id="subjectModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="subjectModalTitle">Add Subject</span>
      <button class="modal-close" onclick="closeModal('subjectModal')">✕</button>
    </div>

    <input type="hidden" id="editSubjectId" />

    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-grid">
        <div class="field">
          <label>Subject Name</label>
          <input type="text" id="subName" placeholder="e.g. Network Security" />
        </div>
        <div class="field">
          <label>Code</label>
          <input type="text" id="subCode" placeholder="e.g. NIS" />
        </div>
      </div>

      <div class="form-grid three">
        <div class="field">
          <label>Year</label>
          <select id="subYear">
            <option value="">— Year —</option>
          </select>
        </div>
        <div class="field">
          <label>Semester</label>
          <select id="subSem">
            <option value="">— Sem —</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
          </select>
        </div>
        <div class="field">
          <label>Division</label>
          <select id="subDiv">
            <option value="">— Division —</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active" data-type="TH"    onclick="setType('TH')">Theory</button>
          <button class="type-btn"        data-type="PR"    onclick="setType('PR')">Practical</button>
          <button class="type-btn"        data-type="TH+PR" onclick="setType('TH+PR')">Both</button>
        </div>
      </div>

      <div class="field">
        <label>Assign Teacher <span style="color:#333;">(optional)</span></label>
        <select id="subTeacher">
          <option value="">— Assign later —</option>
        </select>
      </div>
    </div>

    <div id="subjectMsg"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="saveSubject()">Save Subject</button>
  </div>
</div>

<!-- ════ ADD TEACHER MODAL ════ -->
<div class="overlay" id="teacherModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add Teacher</span>
      <button class="modal-close" onclick="closeModal('teacherModal')">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="tchName" placeholder="e.g. Prof. Anjali Desai" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="tchEmail" placeholder="teacher@college.edu" />
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="tchPass" placeholder="Set a password to share" />
          <button class="pw-toggle" onclick="togglePw('tchPass', this)">Show</button>
        </div>
      </div>
      <div class="field">
        <label>Role</label>
        <select id="tchRole">
          <option value="subject_teacher">Subject Teacher</option>
          <option value="class_teacher">Class Teacher</option>
        </select>
      </div>
    </div>

    <div id="teacherMsg"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="saveTeacher()">Create Teacher Account</button>
  </div>
</div>

<!-- ════ ASSIGN TEACHER MODAL ════ -->
<div class="overlay" id="assignModal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-head">
      <span class="modal-title">Assign Teacher</span>
      <button class="modal-close" onclick="closeModal('assignModal')">✕</button>
    </div>
    <input type="hidden" id="assignSubjectId" />
    <div class="field">
      <label>Teacher</label>
      <select id="assignTeacher">
        <option value="">— Select teacher —</option>
      </select>
    </div>
    <div id="assignMsg"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="saveAssign()">Assign</button>
  </div>
</div>

<script>
  const API   = "https://attendance-version-1.vercel.app";
  const token = localStorage.getItem("token");
  const deptId = localStorage.getItem("departmentId");

  if (!token || localStorage.getItem("role") !== "hod") window.location.href = "login.html";

  const hdrs = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  let dept     = null;
  let teachers = [];
  let subjects = [];
  let selectedType = "TH";

  function $(id) { return document.getElementById(id); }
  function showMsg(elId, text, type) { $(elId).innerHTML = `<div class="msg ${type}">${text}</div>`; }
  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  /* ── Tabs ── */
  function switchTab(name) {
    ["subjects","teachers"].forEach(t => $(`tab-${t}`).style.display = t === name ? "" : "none");
    document.querySelectorAll(".tab").forEach((btn, i) => {
      btn.classList.toggle("active", ["subjects","teachers"][i] === name);
    });
    if (name === "teachers") loadTeachers();
  }

  /* ── Modals ── */
  function openModal(id)  { $(id).classList.add("open"); }
  function closeModal(id) { $(id).classList.remove("open"); }
  document.querySelectorAll(".overlay").forEach(el =>
    el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); })
  );
  function togglePw(id, btn) {
    const inp = $(id);
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "Show" : "Hide";
  }

  /* ── Load department info ── */
  async function loadDept() {
    const res = await fetch(`${API}/departments/${deptId}`, { headers: hdrs });
    dept = await res.json();
    $("navDept").textContent = `${dept.name} (${dept.code})`;
    populateYearFilter();
    populateSubYearDiv();
  }

  function populateYearFilter() {
    const years = (dept.years || []).map(y => y.year).sort();
    $("fYear").innerHTML = `<option value="">All Years</option>` +
      years.map(y => `<option value="${y}">Year ${y}</option>`).join("");
  }

  function populateSubYearDiv() {
    // year dropdown in modal
    const years = (dept.years || []).map(y => y.year).sort();
    $("subYear").innerHTML = `<option value="">— Year —</option>` +
      years.map(y => `<option value="${y}">Year ${y}</option>`).join("");
  }

  // When year changes in modal, update division dropdown
  $("subYear").addEventListener("change", () => {
    const year = +$("subYear").value;
    const yr   = (dept?.years || []).find(y => y.year === year);
    const divs = yr?.divisions || [];
    $("subDiv").innerHTML = `<option value="">— Division —</option>` +
      divs.map(d => `<option value="${d._id}">${d.name} (${d.rollRange.start}–${d.rollRange.end})</option>`).join("");
    // also update filter
    updateDivFilter();
  });

  // Update division filter based on selected year filter
  function updateDivFilter() {
    const year = +$("fYear").value;
    const yr   = (dept?.years || []).find(y => y.year === year);
    const divs = yr?.divisions || (dept?.years || []).flatMap(y => y.divisions);
    $("fDiv").innerHTML = `<option value="">All Divs</option>` +
      divs.map(d => `<option value="${d._id}">Div ${d.name}</option>`).join("");
  }

  $("fYear").addEventListener("change", () => { updateDivFilter(); loadSubjects(); });

  /* ════ SUBJECTS ════ */

  async function loadSubjects() {
    const year = $("fYear").value;
    const sem  = $("fSem").value;
    const div  = $("fDiv").value;
    const params = new URLSearchParams();
    if (year) params.set("year", year);
    if (sem)  params.set("semester", sem);
    if (div)  params.set("divisionId", div);

    const res = await fetch(`${API}/subjects?${params}`, { headers: hdrs });
    subjects  = await res.json();
    renderSubjects();
  }

  function renderSubjects() {
    const tbody = $("subjectBody");
    if (!subjects.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty">No subjects found.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = subjects.map(s => {
      const teacher = s.teacherId
        ? `<span class="pill pill-green">${s.teacherId.name}</span>`
        : `<button class="btn-sm btn-ghost" onclick="openAssign('${s._id}')">Assign</button>`;
      const typePill = s.type === "TH" ? "pill-blue" : s.type === "PR" ? "pill-purple" : "pill-yellow";
      return `<tr>
        <td><strong style="color:#fff">${s.name}</strong><br><span style="font-family:'DM Mono',monospace;font-size:10px;color:#555;">${s.code}</span></td>
        <td><span class="pill pill-blue">Y${s.year} S${s.semester}</span></td>
        <td>Div ${s.divisionName}</td>
        <td><span class="pill ${typePill}">${s.type}</span></td>
        <td>${teacher}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn-sm btn-ghost" onclick="openEditSubject('${s._id}')">Edit</button>
          <button class="btn-sm btn-danger" onclick="deleteSubject('${s._id}')">Delete</button>
        </td>
      </tr>`;
    }).join("");
  }

  /* Subject type toggle */
  function setType(type) {
    selectedType = type;
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.type === type);
    });
  }

  function openSubjectModal(reset = true) {
    if (reset) {
      $("editSubjectId").value = "";
      $("subjectModalTitle").textContent = "Add Subject";
      ["subName","subCode"].forEach(id => $(id).value = "");
      $("subYear").value = ""; $("subSem").value = ""; $("subDiv").innerHTML = `<option value="">— Division —</option>`;
      setType("TH");
      populateTeacherSelect("subTeacher");
    }
    $("subjectMsg").innerHTML = "";
    openModal("subjectModal");
  }

  function openEditSubject(id) {
    const s = subjects.find(x => x._id === id);
    if (!s) return;
    $("editSubjectId").value   = id;
    $("subjectModalTitle").textContent = "Edit Subject";
    $("subName").value         = s.name;
    $("subCode").value         = s.code;
    $("subYear").value         = s.year;
    $("subSem").value          = s.semester;

    // Populate divisions for selected year first
    const yr   = (dept?.years || []).find(y => y.year === s.year);
    const divs = yr?.divisions || [];
    $("subDiv").innerHTML = `<option value="">— Division —</option>` +
      divs.map(d => `<option value="${d._id}"${d._id === s.divisionId ? " selected" : ""}>${d.name} (${d.rollRange.start}–${d.rollRange.end})</option>`).join("");

    setType(s.type);
    populateTeacherSelect("subTeacher", s.teacherId?._id || s.teacherId);
    $("subjectMsg").innerHTML = "";
    openModal("subjectModal");
  }

  async function saveSubject() {
    const id          = $("editSubjectId").value;
    const name        = $("subName").value.trim();
    const code        = $("subCode").value.trim().toUpperCase();
    const year        = +$("subYear").value;
    const semester    = +$("subSem").value;
    const divisionId  = $("subDiv").value;
    const teacherId   = $("subTeacher").value || null;

    // Get division name
    const yr  = (dept?.years || []).find(y => y.year === year);
    const div = (yr?.divisions || []).find(d => d._id === divisionId);

    if (!name || !code || !year || !semester || !divisionId)
      return showMsg("subjectMsg", "All fields except teacher are required.", "err");

    const body = { name, code, year, semester, type: selectedType, divisionId, divisionName: div?.name || "", teacherId };
    const url    = id ? `${API}/subjects/${id}` : `${API}/subjects`;
    const method = id ? "PATCH" : "POST";

    const res  = await fetch(url, { method, headers: hdrs, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) return showMsg("subjectMsg", data.error, "err");

    showMsg("subjectMsg", id ? "Subject updated." : "Subject created.", "ok");
    setTimeout(() => { closeModal("subjectModal"); loadSubjects(); }, 900);
  }

  async function deleteSubject(id) {
    if (!confirm("Delete this subject?")) return;
    await fetch(`${API}/subjects/${id}`, { method: "DELETE", headers: hdrs });
    loadSubjects();
  }

  /* Assign teacher quick modal */
  function openAssign(subjectId) {
    $("assignSubjectId").value = subjectId;
    $("assignMsg").innerHTML = "";
    populateTeacherSelect("assignTeacher");
    openModal("assignModal");
  }

  async function saveAssign() {
    const subjectId = $("assignSubjectId").value;
    const teacherId = $("assignTeacher").value;
    if (!teacherId) return showMsg("assignMsg", "Select a teacher.", "err");

    const res  = await fetch(`${API}/subjects/${subjectId}`, {
      method: "PATCH", headers: hdrs,
      body: JSON.stringify({ teacherId })
    });
    const data = await res.json();
    if (!res.ok) return showMsg("assignMsg", data.error, "err");

    showMsg("assignMsg", "Teacher assigned.", "ok");
    setTimeout(() => { closeModal("assignModal"); loadSubjects(); }, 900);
  }

  /* ════ TEACHERS ════ */

  async function loadTeachers() {
    const res = await fetch(`${API}/users?role=subject_teacher&departmentId=${deptId}`, { headers: hdrs });
    teachers  = await res.json();
    // Also fetch class teachers
    const res2     = await fetch(`${API}/users?role=class_teacher&departmentId=${deptId}`, { headers: hdrs });
    const classTch = await res2.json();
    teachers = [...teachers, ...classTch];
    renderTeachers();
  }

  function renderTeachers() {
    const tbody = $("teacherBody");
    if (!teachers.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty">No teachers yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = teachers.map(t => {
      const rolePill = t.role === "class_teacher" ? "pill-yellow" : "pill-blue";
      const roleLabel = t.role === "class_teacher" ? "Class Teacher" : "Subject Teacher";
      const assigned = (t.assignedSubjects || []).length
        ? (t.assignedSubjects || []).map(a => {
            const s = subjects.find(x => x._id === (a.subjectId?._id || a.subjectId));
            return s ? `<span class="pill pill-blue" style="margin:1px;">${s.code} Div${s.divisionName}</span>` : "";
          }).join("")
        : `<span style="color:#333;font-size:12px;">None</span>`;
      return `<tr>
        <td><strong style="color:#fff">${t.name}</strong></td>
        <td style="color:#666;font-size:12px;">${t.email}</td>
        <td><span class="pill ${rolePill}">${roleLabel}</span></td>
        <td>${assigned}</td>
        <td><button class="btn-sm btn-danger" onclick="deleteTeacher('${t._id}')">Delete</button></td>
      </tr>`;
    }).join("");
  }

  function populateTeacherSelect(selId, selectedId = "") {
    const subjectTeachers = teachers.filter(t => t.role === "subject_teacher");
    $(selId).innerHTML = `<option value="">— Assign later —</option>` +
      subjectTeachers.map(t =>
        `<option value="${t._id}"${t._id === selectedId ? " selected" : ""}>${t.name}</option>`
      ).join("");
  }

  function openTeacherModal() {
    ["tchName","tchEmail","tchPass"].forEach(id => $(id).value = "");
    $("tchRole").value = "subject_teacher";
    $("teacherMsg").innerHTML = "";
    openModal("teacherModal");
  }

  async function saveTeacher() {
    const name     = $("tchName").value.trim();
    const email    = $("tchEmail").value.trim();
    const password = $("tchPass").value;
    const role     = $("tchRole").value;

    if (!name || !email || !password) return showMsg("teacherMsg", "All fields are required.", "err");
    if (password.length < 6)         return showMsg("teacherMsg", "Password must be at least 6 characters.", "err");

    const res  = await fetch(`${API}/users`, {
      method: "POST", headers: hdrs,
      body: JSON.stringify({ name, email, password, role, departmentId: deptId })
    });
    const data = await res.json();
    if (!res.ok) return showMsg("teacherMsg", data.error, "err");

    showMsg("teacherMsg", `Account created for ${name}.`, "ok");
    setTimeout(() => { closeModal("teacherModal"); loadTeachers(); }, 900);
  }

  async function deleteTeacher(id) {
    if (!confirm("Delete this teacher account?")) return;
    await fetch(`${API}/users/${id}`, { method: "DELETE", headers: hdrs });
    loadTeachers();
  }

  /* ── Init ── */
  async function init() {
    await loadDept();
    await loadTeachers();
    await loadSubjects();
  }
  init();
</script>
</body>
</html>
