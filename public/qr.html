<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance QR — Teacher Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --card:     #161616;
  --border:   #262626;
  --border2:  #333333;
  --accent:   #20b2aa;
  --text:     #e8e8e8;
  --muted:    #737373;
  --subtle:   #404040;
  --success:  #4ade80;
  --warn:     #fbbf24;
  --danger:   #f87171;
  --th-color: #60a5fa;
  --pr-color: #c084fc;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1.5;
}

.wrap {
  width: 100%;
  max-width: 480px;
  padding: 1.25rem;
}

/* ── LOGIN ── */
.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  animation: fadeIn .3s ease both;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.logo-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1.75rem;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

.logo-text { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; color: var(--text); }
.logo-sub  { font-size: .68rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; letter-spacing: .05em; }

h2 { font-size: 1.35rem; font-weight: 600; letter-spacing: -.02em; margin-bottom: .3rem; }
.sub { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }

.field { margin-bottom: 1rem; }
label {
  display: block; font-size: .72rem; font-weight: 500;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: .4rem;
}

input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .65rem .9rem;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .875rem;
  outline: none;
  transition: border-color .15s;
}
input::placeholder { color: var(--subtle); }
input:focus { border-color: var(--border2); }

.btn {
  width: 100%;
  padding: .7rem;
  border: none;
  border-radius: 8px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .875rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s, background .15s;
}

.btn-primary {
  background: var(--text);
  color: var(--bg);
}
.btn-primary:hover  { opacity: .88; }
.btn-primary:active { opacity: .78; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.error-msg {
  background: rgba(248,113,113,.08);
  border: 1px solid rgba(248,113,113,.2);
  color: var(--danger);
  border-radius: 6px;
  padding: .55rem .85rem;
  font-size: .8rem;
  margin-bottom: .9rem;
  display: none;
}

/* ── QR SCREEN ── */
.qr-screen { display: none; animation: fadeIn .3s ease both; }

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.user-badge {
  display: flex;
  align-items: center;
  gap: .5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: .3rem .65rem .3rem .45rem;
}

.avatar {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 600; color: var(--bg);
}

.user-name  { font-size: .8rem; font-weight: 500; }
.role-badge {
  font-size: .6rem;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: .03em;
}

.logout-btn {
  background: none; border: none; color: var(--muted);
  font-size: .75rem; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
  padding: .25rem .5rem; border-radius: 4px; transition: color .15s;
}
.logout-btn:hover { color: var(--danger); }

.date-chip {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: .7rem;
  color: var(--muted);
  margin-bottom: .9rem;
}

/* Subject selector */
.selector-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.selector-card h3 {
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: .9rem;
}

.subject-grid { display: grid; gap: .4rem; }

.subject-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .75rem .9rem;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
}

.subject-item:hover { border-color: var(--border2); background: #1a1a1a; }
.subject-item.active { border-color: var(--accent); background: rgba(32,178,170,.06); }

.subj-info { flex: 1; min-width: 0; }
.subj-name { font-size: .875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.subj-meta { font-size: .7rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }

.type-badge {
  font-size: .62rem; font-weight: 500;
  padding: .15rem .5rem; border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  flex-shrink: 0; letter-spacing: .03em;
}
.badge-TH   { background: rgba(96,165,250,.1);  color: var(--th-color); border: 1px solid rgba(96,165,250,.2); }
.badge-PR   { background: rgba(192,132,252,.1); color: var(--pr-color); border: 1px solid rgba(192,132,252,.2); }
.badge-THPR { background: rgba(32,178,170,.1);  color: var(--accent);   border: 1px solid rgba(32,178,170,.2); }

/* lecture type toggle */
.lt-toggle { display: flex; gap: .4rem; margin-top: .75rem; }

.lt-btn {
  flex: 1; padding: .5rem;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: .75rem; font-weight: 500;
  color: var(--muted); transition: all .15s;
}
.lt-btn:hover { border-color: var(--border2); color: var(--text); }
.lt-btn.active-th { background: rgba(96,165,250,.1); border-color: rgba(96,165,250,.3); color: var(--th-color); }
.lt-btn.active-pr { background: rgba(192,132,252,.1); border-color: rgba(192,132,252,.3); color: var(--pr-color); }

/* QR card */
.qr-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  text-align: center;
  display: none;
}
.qr-card.visible { display: block; }

.qr-label {
  font-size: .68rem; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted);
  font-weight: 600; margin-bottom: .9rem;
}

.qr-wrap {
  display: inline-flex;
  align-items: center; justify-content: center;
  background: #fff; border-radius: 10px; padding: 12px;
  position: relative;
}

#qrcode canvas, #qrcode img { display: block; border-radius: 2px; }

.refresh-ring {
  position: absolute; inset: -6px;
  border-radius: 16px; pointer-events: none;
}
.refresh-ring svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.ring-track { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 2.5; }
.ring-prog  { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset .95s linear; }

.qr-footer {
  margin-top: .9rem;
  display: flex; align-items: center; justify-content: space-between;
}

.qr-subject-label { font-size: .8rem; font-weight: 500; text-align: left; line-height: 1.5; }

.timer-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: .72rem;
  color: var(--muted); background: var(--surface);
  border: 1px solid var(--border); padding: .25rem .65rem;
  border-radius: 6px; display: flex; align-items: center; gap: .35rem;
  flex-shrink: 0;
}

.timer-dot {
  width: 5px; height: 5px; background: var(--success);
  border-radius: 50%; animation: blink 1s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.qr-hint {
  margin-top: .65rem; font-size: .65rem; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; word-break: break-all; line-height: 1.6;
  background: var(--surface); border-radius: 6px; padding: .55rem .7rem;
  border: 1px solid var(--border); text-align: left;
}

.empty-state {
  padding: 2rem 1rem; text-align: center;
  color: var(--muted); font-size: .82rem; line-height: 1.8;
}
.empty-state .icon { font-size: 1.5rem; margin-bottom: .6rem; opacity: .3; }

.loading-spin {
  width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--muted);
  border-radius: 50%; animation: spin .7s linear infinite;
  margin: 1.25rem auto;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── LOGIN SCREEN ── -->
  <div class="login-box" id="loginScreen">
    <div class="logo-row">
      <div class="logo-icon">📋</div>
      <div>
        <div class="logo-text">AttendQR</div>
        <div class="logo-sub">TEACHER PORTAL</div>
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="sub">Use your institutional teacher account to continue</p>

    <div class="error-msg" id="loginError"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="teacher@college.edu" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
  </div>

  <!-- ── QR SCREEN ── -->
  <div class="qr-screen" id="qrScreen">

    <div class="top-bar">
      <div class="logo-row" style="margin:0;">
        <div class="logo-icon" style="width:26px;height:26px;font-size:.85rem;">📋</div>
        <span class="logo-text" style="font-size:.9rem;">AttendQR</span>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;">
        <div class="user-badge">
          <div class="avatar" id="avatarEl"></div>
          <span class="user-name" id="userNameEl"></span>
          <span class="role-badge" id="roleBadgeEl"></span>
        </div>
        <button class="logout-btn" onclick="doLogout()">logout</button>
      </div>
    </div>

    <div><span class="date-chip">📅 <span id="dateChip"></span></span></div>

    <!-- subject selector -->
    <div class="selector-card">
      <h3>Your Subjects</h3>
      <div class="subject-grid" id="subjectGrid">
        <div class="loading-spin"></div>
      </div>

      <!-- shown only for TH+PR subjects -->
      <div class="lt-toggle" id="ltToggle" style="display:none;">
        <button class="lt-btn" id="ltTH" onclick="setLectureType('TH')">📘 TH — Theory</button>
        <button class="lt-btn" id="ltPR" onclick="setLectureType('PR')">🔬 PR — Practical</button>
      </div>
    </div>

    <!-- QR display -->
    <div class="qr-card" id="qrCard">
      <div class="qr-label">Scan to Mark Attendance</div>

      <div class="qr-wrap" id="qrWrap">
        <div id="qrcode"></div>
        <div class="refresh-ring">
          <svg viewBox="0 0 108 108">
            <rect class="ring-track" x="3" y="3" width="102" height="102" rx="21"/>
            <rect class="ring-prog"  id="ringProg" x="3" y="3" width="102" height="102" rx="21"/>
          </svg>
        </div>
      </div>

      <div class="qr-footer">
        <span class="qr-subject-label" id="qrSubjectLabel"></span>
        <span class="timer-badge">
          <span class="timer-dot"></span>
          <span id="timerLabel">30s</span>
        </span>
      </div>

      <div class="qr-hint" id="qrHint"></div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">📭</div>
      No subjects are assigned to your account yet.<br/>
      Contact your HOD or admin to get subjects assigned.
    </div>

  </div>
</div>

<script>
/* ── CONFIG ── */
const BASE_URL    = window.location.origin;
const REFRESH_SEC = 30;

/* ── State ── */
let token        = localStorage.getItem('qr_token') || null;
let userData     = JSON.parse(localStorage.getItem('qr_user') || 'null');
let subjects     = [];
let selectedSubj = null;
let lectureType  = 'TH';
let refreshTimer = null;
let countDown    = REFRESH_SEC;

/* ── Ring setup (perimeter of rounded rect approx 396px) ── */
const PERIM = 396;
let ringEl;  // set after DOM ready

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  ringEl = document.getElementById('ringProg');
  ringEl.style.strokeDasharray  = PERIM;
  ringEl.style.strokeDashoffset = 0;

  setDateChip();

  if (token && userData) {
    showQrScreen();
    loadSubjects();
  }

  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('passInput').focus();
  });
  document.getElementById('passInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

function setDateChip() {
  document.getElementById('dateChip').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
  });
}

/* ── Auth ── */
async function doLogin() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passInput').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';
  if (!email || !password) { showErr('Please enter email and password.'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled    = true;

  try {
    const res  = await fetch(`${BASE_URL}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showErr(data.error || 'Login failed.');
      btn.textContent = 'Sign In →'; btn.disabled = false;
      return;
    }

    // Allow teacher-level roles only
    const allowed = ['subject_teacher', 'class_teacher', 'hod', 'admin'];
    if (!allowed.includes(data.role)) {
      showErr('This portal is for teachers only.');
      btn.textContent = 'Sign In →'; btn.disabled = false;
      return;
    }

    token    = data.token;
    userData = { name: data.name, role: data.role };
    localStorage.setItem('qr_token', token);
    localStorage.setItem('qr_user',  JSON.stringify(userData));

    showQrScreen();
    loadSubjects();

  } catch {
    showErr('Could not reach server. Check your connection.');
    btn.textContent = 'Sign In →'; btn.disabled = false;
  }
}

function doLogout() {
  clearInterval(refreshTimer);
  token = null; userData = null; selectedSubj = null; subjects = [];
  localStorage.removeItem('qr_token');
  localStorage.removeItem('qr_user');

  document.getElementById('qrScreen').style.display   = 'none';
  const ls = document.getElementById('loginScreen');
  ls.style.display   = 'block';
  ls.style.animation = 'none';
  void ls.offsetWidth;
  ls.style.animation = '';

  document.getElementById('emailInput').value     = '';
  document.getElementById('passInput').value      = '';
  document.getElementById('loginBtn').textContent = 'Sign In →';
  document.getElementById('loginBtn').disabled    = false;
  document.getElementById('loginError').style.display = 'none';
}

function showErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent   = msg;
  el.style.display = 'block';
}

/* ── Screen ── */
function showQrScreen() {
  document.getElementById('loginScreen').style.display = 'none';
  const qs = document.getElementById('qrScreen');
  qs.style.display = 'block';

  document.getElementById('userNameEl').textContent = userData.name;
  document.getElementById('avatarEl').textContent   = userData.name.charAt(0).toUpperCase();
  document.getElementById('roleBadgeEl').textContent = userData.role.replace('_', ' ');
}

/* ── Load subjects via teacher token ── */
async function loadSubjects() {
  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = '<div class="loading-spin"></div>';
  document.getElementById('emptyState').style.display = 'none';

  try {
    const res = await fetch(`${BASE_URL}/subjects`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (res.status === 401) { doLogout(); return; }
    subjects = await res.json();

    grid.innerHTML = '';

    if (!subjects.length) {
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    subjects.forEach((s, i) => {
      const item = document.createElement('div');
      item.className  = 'subject-item';
      item.dataset.id = s._id;
      item.style.animationDelay = `${i * 60}ms`;

      const badgeCls = s.type === 'TH+PR' ? 'badge-THPR' : s.type === 'PR' ? 'badge-PR' : 'badge-TH';

      item.innerHTML = `
        <div class="subj-info">
          <div class="subj-name">${s.name}</div>
          <div class="subj-meta">${s.code} &nbsp;·&nbsp; Y${s.year} S${s.semester} &nbsp;·&nbsp; ${s.divisionName}</div>
        </div>
        <span class="type-badge ${badgeCls}">${s.type}</span>
      `;

      item.addEventListener('click', () => selectSubject(s));
      grid.appendChild(item);
    });

  } catch {
    grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Failed to load subjects. Please try again.</div>`;
  }
}

/* ── Subject selection ── */
function selectSubject(subj) {
  selectedSubj = subj;

  document.querySelectorAll('.subject-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.subject-item[data-id="${subj._id}"]`).classList.add('active');

  const ltToggle = document.getElementById('ltToggle');
  if (subj.type === 'TH+PR') {
    ltToggle.style.display = 'flex';
    setLectureType(lectureType);
  } else {
    ltToggle.style.display = 'none';
    lectureType = subj.type === 'PR' ? 'PR' : 'TH';
  }

  generateQR();
}

function setLectureType(lt) {
  lectureType = lt;
  document.getElementById('ltTH').className = 'lt-btn' + (lt === 'TH' ? ' active-th' : '');
  document.getElementById('ltPR').className = 'lt-btn' + (lt === 'PR' ? ' active-pr' : '');
  if (selectedSubj) generateQR();
}

/* ── QR generation & auto-refresh ── */
function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function buildCheckinURL(subj, lt) {
  const params = new URLSearchParams({
    subjectId:   subj._id,
    lectureType: lt,
    date:        todayISO()
  });
  return `${BASE_URL}/checkin?${params.toString()}`;
}

function generateQR() {
  if (!selectedSubj) return;
  clearInterval(refreshTimer);

  document.getElementById('qrCard').classList.add('visible');

  const url = buildCheckinURL(selectedSubj, lectureType);
  renderQR(url);
  updateLabels(url);
  startCountdown();
}

function renderQR(url) {
  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  new QRCode(container, {
    text:         url,
    width:        224,
    height:       224,
    colorDark:    '#0d0d15',
    colorLight:   '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

function updateLabels(url) {
  const ispr  = lectureType === 'PR';
  const color = ispr ? 'var(--pr-color)' : 'var(--th-color)';
  const label = ispr ? '🔬 Practical' : '📘 Theory';

  document.getElementById('qrSubjectLabel').innerHTML =
    `<span style="color:${color};font-size:.72rem;">${label}</span><br>
     <strong>${selectedSubj.code}</strong> — ${selectedSubj.name} <span style="color:var(--muted);font-size:.72rem;">(${selectedSubj.divisionName})</span>`;

  document.getElementById('qrHint').textContent = url;
}

function startCountdown() {
  countDown = REFRESH_SEC;
  tickTimer();
  refreshTimer = setInterval(() => {
    countDown--;
    tickTimer();
    if (countDown <= 0) {
      const url = buildCheckinURL(selectedSubj, lectureType);
      renderQR(url);
      updateLabels(url);
      countDown = REFRESH_SEC;
    }
  }, 1000);
}

function tickTimer() {
  document.getElementById('timerLabel').textContent = `${countDown}s`;

  const frac = countDown / REFRESH_SEC;
  ringEl.style.strokeDashoffset = PERIM * (1 - frac);

  if (frac > .5)       ringEl.style.stroke = 'var(--accent)';
  else if (frac > .25) ringEl.style.stroke = 'var(--warn)';
  else                  ringEl.style.stroke = 'var(--danger)';
}
</script>
</body>
</html>
