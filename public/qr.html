<!-- public/qr.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live QR Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      background: #0d0d0d;
      color: #f0f0ee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      margin: 0;
    }
    canvas { border-radius: 12px; }
    #token {
      font-family: monospace;
      font-size: 12px;
      color: #555;
    }
    #countdown {
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2>Scan to Mark Attendance</h2>
  <canvas id="qr"></canvas>
  <div id="token"></div>
  <div id="countdown"></div>

<script>
  const TOKEN_PREFIX = "COLLEGE_QR_";
  const TOKEN_INTERVAL = 30;

  function currentToken() {
    return TOKEN_PREFIX + Math.floor(Date.now() / 1000 / TOKEN_INTERVAL);
  }

  function renderQR() {
    const token = currentToken();
    QRCode.toCanvas(document.getElementById("qr"), token, {
      width: 280,
      color: { dark: "#000000", light: "#ffffff" }
    });
    document.getElementById("token").textContent = token;
  }

  function updateCountdown() {
    const secondsLeft = TOKEN_INTERVAL - (Math.floor(Date.now() / 1000) % TOKEN_INTERVAL);
    document.getElementById("countdown").textContent = `Refreshes in ${secondsLeft}s`;
    if (secondsLeft === TOKEN_INTERVAL) renderQR(); // just rotated
  }

  renderQR();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
