<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; border-bottom: 1px solid #1f1f1f;
      position: sticky; top: 0; background: #0d0d0d; z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s infinite; }
    .dot-yellow { background: #fbbf24; }
    .dot-purple { background: #a78bfa; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .nav-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #555; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-name  { font-size: 13px; color: #666; }
    .btn-logout { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #444; background: none; border: 1px solid #222; border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: all .15s; }
    .btn-logout:hover { color: #f87171; border-color: #3a1515; }

    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Filters ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .filter-bar select, .filter-bar input[type="date"] {
      padding: 8px 12px; font-size: 12px; font-family: 'DM Mono', monospace;
      background: #111; color: #888; border: 1px solid #222; border-radius: 7px;
      outline: none; cursor: pointer; transition: border-color .15s; letter-spacing: .04em;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: #444; color: #fff; }
    .filter-bar select option { background: #1a1a1a; }

    .btn { padding: 8px 16px; border-radius: 7px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: .06em; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: #fff; color: #0d0d0d; }
    .btn-primary:hover { background: #d8d8d8; }
    .btn-outline { background: none; color: #888; border: 1px solid #2a2a2a; }
    .btn-outline:hover { color: #fff; border-color: #444; }

    /* ── Role badge ── */
    .role-strip {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; padding: 12px 16px;
      background: #111; border: 1px solid #1f1f1f; border-radius: 8px;
    }
    .role-strip .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #444; }
    .role-strip .val   { font-size: 13px; color: #ccc; }
    .sep { color: #333; }

    /* ── Table ── */
    .card { background: #111; border: 1px solid #1f1f1f; border-radius: 10px; overflow: hidden; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; color: #444; text-align: left;
      padding: 10px 12px; border-bottom: 1px solid #1f1f1f;
      white-space: nowrap; background: #0f0f0f;
    }
    tbody td {
      padding: 10px 12px; font-size: 13px; color: #999;
      border-bottom: 1px solid #161616; white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #131313; }

    .P { color: #4ade80; font-family: 'DM Mono', monospace; font-size: 11px; }
    .A { color: #333;    font-family: 'DM Mono', monospace; font-size: 11px; }

    .pct { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
    .pct-ok   { color: #4ade80; }
    .pct-warn { color: #fbbf24; }
    .pct-bad  { color: #f87171; }

    .pill { display: inline-block; padding: 2px 8px; font-family: 'DM Mono', monospace; font-size: 10px; border-radius: 4px; }
    .pill-blue   { background: #0d1520; color: #60a5fa; border: 1px solid #1a3050; }
    .pill-purple { background: #130d20; color: #a78bfa; border: 1px solid #2a1a50; }

    .empty { text-align: center; padding: 48px; color: #333; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; }

    /* ── Summary ── */
    .summary { display: flex; gap: 24px; padding: 14px 18px; border-top: 1px solid #1a1a1a; flex-wrap: wrap; }
    .sum-item { font-family: 'DM Mono', monospace; }
    .sum-val  { color: #fff; font-size: 18px; display: block; margin-bottom: 2px; }
    .sum-lbl  { color: #444; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }

    /* ── Subject tabs (subject_teacher only) ── */
    .sub-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .sub-pill {
      padding: 7px 14px; border-radius: 20px; font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: .06em; cursor: pointer;
      border: 1px solid #2a2a2a; background: #111; color: #555; transition: all .15s;
    }
    .sub-pill:hover { color: #fff; border-color: #444; }
    .sub-pill.active { background: #130d20; color: #a78bfa; border-color: #2a1a50; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-dot" id="navDot"></div>
    <span class="nav-title" id="navTitle">Attendance</span>
  </div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">

  <!-- Role info strip -->
  <div class="role-strip" id="roleStrip" style="display:none;"></div>

  <!-- Subject pills — subject_teacher only -->
  <div class="sub-bar" id="subBar" style="display:none;"></div>

  <!-- Filters -->
  <div class="filter-bar">
    <!-- class_teacher filters -->
    <select id="fSubject" style="display:none;" onchange="onFilterChange()">
      <option value="">All Subjects</option>
    </select>
    <select id="fYear" style="display:none;" onchange="onFilterChange()">
      <option value="">All Years</option>
    </select>
    <select id="fSem" style="display:none;" onchange="onFilterChange()">
      <option value="">All Sems</option>
      <option value="1">Sem 1</option>
      <option value="2">Sem 2</option>
    </select>
    <select id="fDiv" style="display:none;" onchange="onFilterChange()">
      <option value="">All Divisions</option>
    </select>
    <!-- shared -->
    <select id="fRange" onchange="onFilterChange()">
      <option value="week">Last 1 Week</option>
      <option value="2weeks">Last 2 Weeks</option>
      <option value="month">Last 1 Month</option>
      <option value="custom">Custom range</option>
    </select>
    <input type="date" id="fFrom" style="display:none;" onchange="onFilterChange()" />
    <input type="date" id="fTo"   style="display:none;" onchange="onFilterChange()" />
    <button class="btn btn-outline" onclick="exportExcel()">↓ Export</button>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead id="tHead"></thead>
        <tbody id="tBody"><tr><td class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="summary" id="summary" style="display:none;"></div>
  </div>

</div>

<script>
  const API   = "https://attendance-version-1.vercel.app";
  const token = localStorage.getItem("token");
  const role  = localStorage.getItem("role");

  if (!token || !["class_teacher","subject_teacher"].includes(role))
    window.location.href = "login.html";

  const hdrs = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  function $(id) { return document.getElementById(id); }
  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  let dept           = null;   // full department object (class_teacher)
  let allSubjects    = [];     // all subjects in dept (class_teacher) or assigned (subject_teacher)
  let activeSubject  = null;   // selected subject pill (subject_teacher)

  /* ── Nav setup by role ── */
  $("navName").textContent = localStorage.getItem("name") || "";
  if (role === "class_teacher") {
    $("navDot").classList.add("dot-yellow");
    $("navTitle").textContent = "Class Teacher";
  } else {
    $("navDot").classList.add("dot-purple");
    $("navTitle").textContent = "Subject Teacher";
  }

  /* ── Range custom toggle ── */
  $("fRange").addEventListener("change", () => {
    const custom = $("fRange").value === "custom";
    $("fFrom").style.display = custom ? "" : "none";
    $("fTo").style.display   = custom ? "" : "none";
    if (!custom) onFilterChange();
  });

  /* ── Init ── */
  async function init() {
    if (role === "class_teacher") {
      await initClassTeacher();
    } else {
      await initSubjectTeacher();
    }
  }

  /* ════ CLASS TEACHER ════ */
  async function initClassTeacher() {
    const deptId = localStorage.getItem("departmentId");
    const res    = await fetch(`${API}/departments/${deptId}`, { headers: hdrs });
    dept         = await res.json();

    // Role strip
    $("roleStrip").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Department</span>
      <span class="val">${dept.name} (${dept.code})</span>
      <span class="sep">·</span>
      <span class="label">Access</span>
      <span class="val">All subjects, all years</span>`;

    // Load all subjects in dept
    const sRes   = await fetch(`${API}/subjects?departmentId=${deptId}`, { headers: hdrs });
    allSubjects  = await sRes.json();

    // Populate filters
    $("fSubject").style.display = "";
    $("fYear").style.display    = "";
    $("fSem").style.display     = "";
    $("fDiv").style.display     = "";

    $("fSubject").innerHTML = `<option value="">All Subjects</option>` +
      allSubjects.map(s => `<option value="${s._id}">${s.name} (${s.code}) · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}</option>`).join("");

    const years = [...new Set((dept.years || []).map(y => y.year))].sort();
    $("fYear").innerHTML = `<option value="">All Years</option>` +
      years.map(y => `<option value="${y}">Year ${y}</option>`).join("");

    $("fYear").addEventListener("change", () => {
      const yr  = +$("fYear").value;
      const yObj = (dept.years || []).find(y => y.year === yr);
      const divs = yObj?.divisions || (dept.years || []).flatMap(y => y.divisions);
      $("fDiv").innerHTML = `<option value="">All Divisions</option>` +
        divs.map(d => `<option value="${d._id}">Div ${d.name}</option>`).join("");
    });

    loadAttendance();
  }

  /* ════ SUBJECT TEACHER ════ */
  async function initSubjectTeacher() {
    const res   = await fetch(`${API}/subjects`, { headers: hdrs });
    allSubjects = await res.json();

    if (!allSubjects.length) {
      $("tBody").innerHTML = `<tr><td class="empty">No subjects assigned yet.</td></tr>`;
      return;
    }

    // Show subject pills
    $("subBar").style.display = "";
    $("subBar").innerHTML = allSubjects.map(s =>
      `<button class="sub-pill" data-id="${s._id}" onclick="selectSubject('${s._id}')">
        ${s.code} · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}
      </button>`
    ).join("");

    // Role strip
    $("roleStrip").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Role</span><span class="val">Subject Teacher</span>
      <span class="sep">·</span>
      <span class="label">Subjects</span>
      <span class="val">${allSubjects.length} assigned</span>`;

    // Auto-select first
    selectSubject(allSubjects[0]._id);
  }

  function selectSubject(id) {
    activeSubject = allSubjects.find(s => s._id === id);
    document.querySelectorAll(".sub-pill").forEach(p =>
      p.classList.toggle("active", p.dataset.id === id)
    );
    // Update role strip
    $("roleStrip").innerHTML = `
      <span class="label">Subject</span><span class="val">${activeSubject.name} (${activeSubject.code})</span>
      <span class="sep">·</span>
      <span class="label">Division</span><span class="val">${activeSubject.divisionName}</span>
      <span class="sep">·</span>
      <span class="label">Year / Sem</span><span class="val">Y${activeSubject.year} S${activeSubject.semester}</span>
      <span class="sep">·</span>
      <span class="pill pill-${activeSubject.type === 'TH' ? 'blue' : 'purple'}">${activeSubject.type}</span>`;
    loadAttendance();
  }

  /* ════ LOAD ATTENDANCE ════ */
  function onFilterChange() { loadAttendance(); }

  async function loadAttendance() {
    $("tBody").innerHTML = `<tr><td class="empty">Loading…</td></tr>`;
    $("tHead").innerHTML = "";
    $("summary").style.display = "none";

    const params = new URLSearchParams();

    if (role === "subject_teacher") {
      if (!activeSubject) return;
      params.set("subjectId", activeSubject._id);
    } else {
      // class_teacher
      const subId = $("fSubject").value;
      const year  = $("fYear").value;
      const sem   = $("fSem").value;
      const divId = $("fDiv").value;
      if (subId) params.set("subjectId", subId);
      if (year)  params.set("year", year);
      if (sem)   params.set("semester", sem);
      if (divId) params.set("divisionId", divId);
    }

    // Date range
    const range = $("fRange").value;
    if (range === "custom") {
      const from = $("fFrom").value;
      const to   = $("fTo").value;
      if (from) params.set("from", from);
      if (to)   params.set("to", to);
    } else {
      params.set("range", range);
    }

    const res  = await fetch(`${API}/attendance?${params}`, { headers: hdrs });
    const data = await res.json();

    if (!data.length) {
      $("tBody").innerHTML = `<tr><td class="empty">No records found for this selection.</td></tr>`;
      return;
    }

    renderTable(data);
  }

  /* ════ RENDER TABLE ════ */
  function renderTable(records) {
    // Unique sorted dates
    const dates = [...new Set(records.map(r => r.date))].sort();

    // Group by student roll
    const students = {};
    records.forEach(r => {
      students[r.studentRoll] ??= { roll: r.studentRoll, name: r.studentName, dates: new Set() };
      students[r.studentRoll].dates.add(r.date);
    });

    const rows = Object.values(students).sort((a, b) => +a.roll - +b.roll);

    // Header
    $("tHead").innerHTML = `<tr>
      <th>Roll</th><th>Name</th>
      ${dates.map(d => `<th>${fmtDate(d)}</th>`).join("")}
      <th>Present</th><th>Total</th><th>%</th>
    </tr>`;

    // Rows
    $("tBody").innerHTML = rows.map(s => {
      const attended = dates.filter(d => s.dates.has(d)).length;
      const pct      = Math.round((attended / dates.length) * 100);
      const cls      = pct >= 75 ? "pct-ok" : pct >= 60 ? "pct-warn" : "pct-bad";
      return `<tr>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:#555;">${s.roll}</td>
        <td style="color:#ccc;">${s.name}</td>
        ${dates.map(d => `<td class="${s.dates.has(d) ? "P" : "A"}">${s.dates.has(d) ? "P" : "A"}</td>`).join("")}
        <td style="font-family:'DM Mono',monospace;font-size:12px;">${attended}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:#555;">${dates.length}</td>
        <td class="pct ${cls}">${pct}%</td>
      </tr>`;
    }).join("");

    // Summary
    const total  = rows.length;
    const avg    = Math.round(rows.reduce((s, r) => s + (r.dates.size / dates.length) * 100, 0) / total);
    const below  = rows.filter(r => (r.dates.size / dates.length) * 100 < 75).length;

    $("summary").style.display = "";
    $("summary").innerHTML = [
      ["Students",       total],
      ["Lectures",       dates.length],
      ["Avg Attendance", avg + "%"],
      ["Below 75%",      below]
    ].map(([l, v]) => `<div class="sum-item"><span class="sum-val">${v}</span><span class="sum-lbl">${l}</span></div>`).join("");
  }

  /* ════ EXPORT ════ */
  function exportExcel() {
    const id = role === "subject_teacher"
      ? activeSubject?._id
      : $("fSubject").value;

    if (!id) return alert("Select a subject to export.");

    const range = $("fRange").value;
    let url = `${API}/export/${id}`;
    if (range === "custom") {
      const from = $("fFrom").value, to = $("fTo").value;
      url += `?from=${from}&to=${to}`;
    } else {
      url += `?range=${range}`;
    }
    window.open(url, "_blank");
  }

  function fmtDate(iso) {
    const [y, m, d] = iso.split("-");
    return `${d} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]}`;
  }

  init();
</script>
</body>
</html>
