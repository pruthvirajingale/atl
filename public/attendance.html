<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    /* Vertical divider */
    .th-divider {
      border-right: 1.5px solid #c0c0c8 !important;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-dot" id="navDot"></div>
    <span class="nav-title" id="navTitle">Attendance</span>
  </div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">
  <div class="role-strip" id="roleStrip" style="display:none;"></div>
  <div class="sub-bar"   id="subBar"    style="display:none;"></div>

  <div class="filter-bar">
    <select id="fSubject" style="display:none;"></select>
    <select id="fYear"    style="display:none;"></select>
    <select id="fSem"     style="display:none;">
      <option value="">All Sems</option>
      <option value="1">Sem 1</option>
      <option value="2">Sem 2</option>
    </select>
    <select id="fDiv" style="display:none;"></select>
    <select id="fRange">
      <option value="week">Last 1 Week</option>
      <option value="2weeks">Last 2 Weeks</option>
      <option value="month">Last 1 Month</option>
      <option value="custom">Custom range</option>
    </select>
    <input type="date" id="fFrom" style="display:none;" />
    <input type="date" id="fTo"   style="display:none;" />
    <button class="btn btn-outline" onclick="exportExcel()">↓ Export</button>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table class="tbl">
        <thead id="tHead"></thead>
        <tbody id="tBody"><tr><td class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="summary" id="summary" style="display:none;"></div>
  </div>
</div>

<div id="saveToast" class="save-toast" style="display:none;"></div>

<script>
  const API   = "https://attendance-version-1.vercel.app";
  const token = localStorage.getItem("token");
  const role  = localStorage.getItem("role");

  if (!token || !["class_teacher", "subject_teacher"].includes(role))
    window.location.href = "login.html";

  const hdrs = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  const MONTHS  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fmtDate = iso => { const [,m,d] = iso.split("-"); return `${d} ${MONTHS[+m-1]}`; };
  const pctCls  = p => p === null ? "" : p >= 75 ? "pct-ok" : p >= 60 ? "pct-warn" : "pct-bad";
  const $       = id => document.getElementById(id);

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  // ── Shared state ──
  let dept          = null;
  let allSubjects   = [];
  let activeSubject = null;
  let state         = { rows: [], thDates: [], prDates: [], hasTH: false, hasPR: false };

  // ── Nav ──
  $("navName").textContent = localStorage.getItem("name") || "";
  if (role === "class_teacher") {
    $("navDot").classList.add("dot-yellow");
    $("navTitle").textContent = "Class Teacher";
  } else {
    $("navDot").classList.add("dot-purple");
    $("navTitle").textContent = "Subject Teacher";
  }

  // ── Range filter ──
  $("fRange").addEventListener("change", () => {
    const custom = $("fRange").value === "custom";
    $("fFrom").style.display = $("fTo").style.display = custom ? "" : "none";
    if (!custom) loadAttendance();
  });
  ["fSubject","fYear","fSem","fDiv","fFrom","fTo"].forEach(id =>
    $(id).addEventListener("change", loadAttendance)
  );

  // ── Fetch helper ──
  async function safeFetch(path) {
    try {
      const res = await fetch(`${API}${path}`, { headers: hdrs });
      if (!res.ok) return [];
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    } catch { return []; }
  }

  // ── Init ──
  async function init() {
    try {
      role === "class_teacher" ? await initClassTeacher() : await initSubjectTeacher();
    } catch (err) {
      $("tBody").innerHTML = `<tr><td class="empty">Failed to load: ${err.message}</td></tr>`;
    }
  }

  async function initClassTeacher() {
    const deptId = localStorage.getItem("departmentId");
    dept = await fetch(`${API}/departments/${deptId}`, { headers: hdrs }).then(r => r.json());

    $("roleStrip").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Department</span>
      <span class="val">${dept.name} (${dept.code})</span>
      <span class="sep">·</span>
      <span class="label">Access</span>
      <span class="val">All subjects, all years</span>`;

    allSubjects = await safeFetch(`/subjects?departmentId=${deptId}`);

    ["fSubject","fYear","fSem","fDiv"].forEach(id => $(id).style.display = "");

    $("fSubject").innerHTML = `<option value="">All Subjects</option>` +
      allSubjects.map(s =>
        `<option value="${s._id}">${s.name} (${s.code}) · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}</option>`
      ).join("");

    const years = [...new Set((dept.years || []).map(y => y.year))].sort();
    $("fYear").innerHTML = `<option value="">All Years</option>` +
      years.map(y => `<option value="${y}">Year ${y}</option>`).join("");

    $("fYear").addEventListener("change", () => {
      const yr   = +$("fYear").value;
      const yObj = (dept.years || []).find(y => y.year === yr);
      const divs = yObj?.divisions || (dept.years || []).flatMap(y => y.divisions);
      $("fDiv").innerHTML = `<option value="">All Divisions</option>` +
        divs.map(d => `<option value="${d._id}">Div ${d.name}</option>`).join("");
    });

    loadAttendance();
  }

  async function initSubjectTeacher() {
    allSubjects = await safeFetch("/subjects");

    if (!allSubjects.length) {
      $("tBody").innerHTML = `<tr><td class="empty">No subjects assigned yet.</td></tr>`;
      return;
    }

    $("roleStrip").style.display = $("subBar").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Role</span><span class="val">Subject Teacher</span>
      <span class="sep">·</span>
      <span class="label">Subjects</span>
      <span class="val">${allSubjects.length} assigned</span>`;

    $("subBar").innerHTML = allSubjects.map(s =>
      `<button class="sub-pill" data-id="${s._id}" onclick="selectSubject('${s._id}')">
        ${s.code} · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}
      </button>`
    ).join("");

    selectSubject(allSubjects[0]._id);
  }

  function selectSubject(id) {
    activeSubject = allSubjects.find(s => s._id === id);
    document.querySelectorAll(".sub-pill").forEach(p =>
      p.classList.toggle("active", p.dataset.id === id)
    );
    $("roleStrip").innerHTML = `
      <span class="label">Subject</span><span class="val">${activeSubject.name} (${activeSubject.code})</span>
      <span class="sep">·</span>
      <span class="label">Division</span><span class="val">${activeSubject.divisionName}</span>
      <span class="sep">·</span>
      <span class="label">Year / Sem</span><span class="val">Y${activeSubject.year} S${activeSubject.semester}</span>
      <span class="sep">·</span>
      <span class="pill pill-${activeSubject.type === "TH" ? "blue" : "purple"}">${activeSubject.type}</span>`;
    loadAttendance();
  }

  // ── Load Attendance ──
  async function loadAttendance() {
    $("tBody").innerHTML = `<tr><td class="empty">Loading…</td></tr>`;
    $("tHead").innerHTML = "";
    $("summary").style.display = "none";

    try {
      const params     = new URLSearchParams();
      let   divisionId = null;

      if (role === "subject_teacher") {
        if (!activeSubject) return;
        params.set("subjectId",  activeSubject._id);
        params.set("divisionId", activeSubject.divisionId);
        divisionId = activeSubject.divisionId;
      } else {
        const subId = $("fSubject").value;
        const divId = $("fDiv").value;

        if (subId) {
          params.set("subjectId", subId);
          const sub = allSubjects.find(s => s._id === subId);
          if (!divId && sub?.divisionId) {
            params.set("divisionId", sub.divisionId);
            divisionId = sub.divisionId;
          }
        }
        const year = $("fYear").value, sem = $("fSem").value;
        if (year)  params.set("year", year);
        if (sem)   params.set("semester", sem);
        if (divId) { params.set("divisionId", divId); divisionId = divId; }
      }

      const range = $("fRange").value;
      if (range === "custom") {
        const from = $("fFrom").value, to = $("fTo").value;
        if (from) params.set("from", from);
        if (to)   params.set("to",   to);
      } else {
        params.set("range", range);
      }

      const [records, roster] = await Promise.all([
        safeFetch(`/attendance?${params}`),
        divisionId ? safeFetch(`/students?divisionId=${divisionId}`) : Promise.resolve([]),
      ]);

      if (!records.length && !roster.length) {
        $("tBody").innerHTML = `<tr><td class="empty">No records found for this selection.</td></tr>`;
        return;
      }

      renderTable(records, roster);
    } catch (err) {
      $("tBody").innerHTML = `<tr><td class="empty">Error: ${err.message}</td></tr>`;
    }
  }

  // ── Render Table ──
  function renderTable(records, roster) {
    const thDates = [...new Set(records.filter(r => r.lectureType === "TH").map(r => r.date))].sort();
    const prDates = [...new Set(records.filter(r => r.lectureType === "PR").map(r => r.date))].sort();
    const hasTH   = thDates.length > 0;
    const hasPR   = prDates.length > 0;

    // Build student map — roster first, then overlay attendance
    const students = Object.fromEntries(
      (roster || []).map(s => [String(s.roll), { roll: String(s.roll), name: s.name, thDates: new Set(), prDates: new Set() }])
    );
    records.forEach(r => {
      students[r.studentRoll] ??= { roll: r.studentRoll, name: r.studentName, thDates: new Set(), prDates: new Set() };
      (r.lectureType === "TH" ? students[r.studentRoll].thDates : students[r.studentRoll].prDates).add(r.date);
    });

    const rows = Object.values(students).sort((a, b) => +a.roll - +b.roll);
    state = { rows, thDates, prDates, hasTH, hasPR };

    // No lectures yet
    if (!hasTH && !hasPR) {
      $("tHead").innerHTML = `<tr><th>Roll</th><th>Name</th><th style="color:var(--ink-muted);font-weight:400;font-size:13px;">No lectures recorded yet</th></tr>`;
      $("tBody").innerHTML = rows.map(s =>
        `<tr><td class="td-roll">${s.roll}</td><td>${s.name}</td><td style="color:var(--ink-faint);text-align:center;">—</td></tr>`
      ).join("");
      renderSummary();
      return;
    }

    const subjectId = activeSubject?._id || $("fSubject").value;

    // attCell — divider = true puts border on the RIGHT of this cell
    const attCell = (d, type, present, roll, name, divider = false) =>
      `<td class="${present ? "P" : "A"} att-cell${divider ? " th-divider" : ""}"
        data-roll="${roll}" data-name="${encodeURIComponent(name)}"
        data-date="${d}" data-type="${type}" data-subject="${subjectId}"
        onclick="toggleAttendance(this)" title="Click to toggle"
      >${present ? "P" : "A"}</td>`;

    // ── Header row 1: group labels ──
    // Divider 1: after TH — Theory group header  (only when both TH and PR exist)
    // Divider 2: after PR — Practical group header (always, to cap that block)
    const thGroupTh = hasTH
      ? `<th${thDates.length > 1 ? ` colspan="${thDates.length}"` : ""}
            class="th-group-th${hasPR ? " th-divider" : ""}"
         >TH — Theory</th>`
      : "";
    const prGroupTh = hasPR
      ? `<th${prDates.length > 1 ? ` colspan="${prDates.length}"` : ""}
            class="th-group-th th-divider"
         >PR — Practical</th>`
      : "";

    // Divider 3: after PR% column header (before Overall %)
    const pctCols = [
      hasTH && `<th>TH %</th>`,
      hasPR && `<th class="th-divider">PR %</th>`,
      hasTH && hasPR && `<th>Overall %</th>`,
    ].filter(Boolean).join("");

    // ── Header row 2: individual date cells ──
    // Divider 1 repeated: last TH date cell
    // Divider 2 repeated: last PR date cell
    // Divider 3 repeated: PR% placeholder cell
    $("tHead").innerHTML =
      `<tr><th>Roll</th><th>Name</th>${thGroupTh}${prGroupTh}${pctCols}</tr>` +
      `<tr><th></th><th></th>` +
      (hasTH ? thDates.map((d, i) =>
        `<th class="th-date-th${(hasPR && i === thDates.length - 1) ? " th-divider" : ""}">${fmtDate(d)}</th>`
      ).join("") : "") +
      (hasPR ? prDates.map((d, i) =>
        `<th class="th-date-pr${i === prDates.length - 1 ? " th-divider" : ""}">${fmtDate(d)}</th>`
      ).join("") : "") +
      (hasTH ? `<th></th>` : "") +
      (hasPR ? `<th class="th-divider"></th>` : "") +
      (hasTH && hasPR ? `<th></th>` : "") +
      `</tr>`;

    // ── Body rows ──
    $("tBody").innerHTML = rows.map(s => {
      const thAtt = thDates.filter(d => s.thDates.has(d)).length;
      const prAtt = prDates.filter(d => s.prDates.has(d)).length;
      const thPct = hasTH && thDates.length ? Math.round((thAtt / thDates.length) * 100) : null;
      const prPct = hasPR && prDates.length ? Math.round((prAtt / prDates.length) * 100) : null;
      const ovPct = (hasTH && hasPR && thDates.length + prDates.length)
        ? Math.round(((thAtt + prAtt) / (thDates.length + prDates.length)) * 100) : null;

      const mkPctCell = (val, attr, extraCls = "") =>
        `<td class="${pctCls(val)}${extraCls ? " " + extraCls : ""}" data-${attr}="${s.roll}">${val !== null ? val + "%" : "N/A"}</td>`;

      return `<tr>
        <td class="td-roll">${s.roll}</td><td>${s.name}</td>
        ${hasTH ? thDates.map((d, i) =>
          attCell(d, "TH", s.thDates.has(d), s.roll, s.name, hasPR && i === thDates.length - 1)
        ).join("") : ""}
        ${hasPR ? prDates.map((d, i) =>
          attCell(d, "PR", s.prDates.has(d), s.roll, s.name, i === prDates.length - 1)
        ).join("") : ""}
        ${hasTH ? mkPctCell(thPct, "th-pct") : ""}
        ${hasPR ? mkPctCell(prPct, "pr-pct", "th-divider") : ""}
        ${hasTH && hasPR ? mkPctCell(ovPct, "ov-pct") : ""}
      </tr>`;
    }).join("");

    renderSummary();
  }

  // ── Toggle Attendance ──
  async function toggleAttendance(cell) {
    if (cell.dataset.saving) return;

    const { roll, date, type: lectureType, subject: subjectId } = cell.dataset;
    const name       = decodeURIComponent(cell.dataset.name);
    const isPresent  = cell.classList.contains("P");
    const newPresent = !isPresent;

    cell.dataset.saving = "1";
    cell.classList.add("att-saving");
    cell.classList.replace(isPresent ? "P" : "A", newPresent ? "P" : "A");
    cell.textContent = newPresent ? "P" : "A";

    const student = state.rows.find(r => r.roll === roll);
    const dateSet = student && (lectureType === "TH" ? student.thDates : student.prDates);
    if (dateSet) newPresent ? dateSet.add(date) : dateSet.delete(date);

    try {
      const res = await fetch(`${API}/attendance`, {
        method:  "PATCH",
        headers: hdrs,
        body:    JSON.stringify({ studentRoll: roll, studentName: name, subjectId, date, lectureType, present: newPresent }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || res.statusText);
      }
      updateRowStats(roll);
      renderSummary();
      showToast(`${roll} · ${fmtDate(date)} (${lectureType}) → ${newPresent ? "Present" : "Absent"}`, "ok");
    } catch (err) {
      // Revert
      cell.classList.replace(newPresent ? "P" : "A", isPresent ? "P" : "A");
      cell.textContent = isPresent ? "P" : "A";
      if (dateSet) isPresent ? dateSet.add(date) : dateSet.delete(date);
      showToast(`Failed to update: ${err.message}`, "err");
    } finally {
      delete cell.dataset.saving;
      cell.classList.remove("att-saving");
    }
  }

  function updateRowStats(roll) {
    const { rows, thDates, prDates, hasTH, hasPR } = state;
    const s = rows.find(r => r.roll === roll);
    if (!s) return;

    const update = (dates, set, attr) => {
      const pct  = dates.length ? Math.round((dates.filter(d => set.has(d)).length / dates.length) * 100) : null;
      const cell = document.querySelector(`[data-${attr}="${roll}"]`);
      // Preserve th-divider on pr-pct cells
      if (cell) {
        cell.className = pctCls(pct) + (attr === "pr-pct" ? " th-divider" : "");
        cell.textContent = pct !== null ? pct + "%" : "N/A";
      }
      return pct;
    };

    const thPct = hasTH ? update(thDates, s.thDates, "th-pct") : null;
    const prPct = hasPR ? update(prDates, s.prDates, "pr-pct") : null;

    if (hasTH && hasPR) {
      const totLec = thDates.length + prDates.length;
      const totAtt = thDates.filter(d => s.thDates.has(d)).length + prDates.filter(d => s.prDates.has(d)).length;
      const ovPct  = totLec ? Math.round((totAtt / totLec) * 100) : null;
      const cell   = document.querySelector(`[data-ov-pct="${roll}"]`);
      if (cell) { cell.className = pctCls(ovPct); cell.textContent = ovPct !== null ? ovPct + "%" : "N/A"; }
    }
  }

  // ── Summary ──
  function renderSummary() {
    const { rows, thDates, prDates, hasTH, hasPR } = state;
    if (!rows.length) return;

    const items = [["Students", rows.length]];
    if (hasTH) items.push(["TH Lectures", thDates.length]);
    if (hasPR) items.push(["PR Lectures", prDates.length]);

    $("summary").style.display = "";
    $("summary").innerHTML = items
      .map(([l, v]) => `<div class="sum-item"><span class="sum-val">${v}</span><span class="sum-lbl">${l}</span></div>`)
      .join("");
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = "ok") {
    const t = $("saveToast");
    t.textContent = msg;
    t.className   = `save-toast save-toast-${type}`;
    t.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.display = "none"; }, 2500);
  }

  // ── Export ──
  async function exportExcel() {
    const id = role === "subject_teacher" ? activeSubject?._id : $("fSubject").value;
    if (!id) return alert("Select a subject to export.");

    const range = $("fRange").value;
    const qs    = range === "custom"
      ? `?from=${$("fFrom").value}&to=${$("fTo").value}`
      : `?range=${range}`;

    try {
      const res = await fetch(`${API}/export/${id}${qs}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        return alert(`Export failed: ${err.error || res.statusText}`);
      }
      const disposition = res.headers.get("Content-Disposition") || "";
      const match       = disposition.match(/filename[^;=\n]*=['"]?([^'";\n]+)['"]?/i);
      const filename    = match ? match[1] : "attendance_export.xlsx";
      const blobUrl     = URL.createObjectURL(await res.blob());
      const a = Object.assign(document.createElement("a"), { href: blobUrl, download: filename });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(blobUrl);
    } catch (err) {
      alert("Export failed. Please try again.");
    }
  }

  init();
</script>
</body>
</html>
