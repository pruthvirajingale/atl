<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-dot" id="navDot"></div>
    <span class="nav-title" id="navTitle">Attendance</span>
  </div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">

  <div class="role-strip" id="roleStrip" style="display:none;"></div>
  <div class="sub-bar"   id="subBar"    style="display:none;"></div>

  <div class="filter-bar">
    <select id="fSubject" style="display:none;" onchange="onFilterChange()">
      <option value="">All Subjects</option>
    </select>
    <select id="fYear" style="display:none;" onchange="onFilterChange()">
      <option value="">All Years</option>
    </select>
    <select id="fSem" style="display:none;" onchange="onFilterChange()">
      <option value="">All Sems</option>
      <option value="1">Sem 1</option>
      <option value="2">Sem 2</option>
    </select>
    <select id="fDiv" style="display:none;" onchange="onFilterChange()">
      <option value="">All Divisions</option>
    </select>
    <select id="fRange" onchange="onFilterChange()">
      <option value="week">Last 1 Week</option>
      <option value="2weeks">Last 2 Weeks</option>
      <option value="month">Last 1 Month</option>
      <option value="custom">Custom range</option>
    </select>
    <input type="date" id="fFrom" style="display:none;" onchange="onFilterChange()" />
    <input type="date" id="fTo"   style="display:none;" onchange="onFilterChange()" />
    <button class="btn btn-outline" onclick="exportExcel()">↓ Export</button>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table class="tbl">
        <thead id="tHead"></thead>
        <tbody id="tBody"><tr><td class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="summary" id="summary" style="display:none;"></div>
  </div>

</div>

<div id="saveToast" class="save-toast" style="display:none;"></div>

<script>
  const API = "https://attendance-version-1.vercel.app";
  const token = localStorage.getItem("token");
  const role  = localStorage.getItem("role");

  if (!token || !["class_teacher", "subject_teacher"].includes(role))
    window.location.href = "login.html";

  const hdrs = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fmtDate(iso) { const [, m, d] = iso.split("-"); return `${d} ${MONTHS[+m - 1]}`; }
  function pctCls(p)    { return p === null ? "" : p >= 75 ? "pct-ok" : p >= 60 ? "pct-warn" : "pct-bad"; }
  function $(id)        { return document.getElementById(id); }
  function logout()     { localStorage.clear(); window.location.href = "login.html"; }

  let dept          = null;
  let allSubjects   = [];
  let activeSubject = null;

  let currentRows    = [];
  let currentThDates = [];
  let currentPrDates = [];
  let currentHasTH   = false;
  let currentHasPR   = false;

  $("navName").textContent = localStorage.getItem("name") || "";
  if (role === "class_teacher") {
    $("navDot").classList.add("dot-yellow");
    $("navTitle").textContent = "Class Teacher";
  } else {
    $("navDot").classList.add("dot-purple");
    $("navTitle").textContent = "Subject Teacher";
  }

  $("fRange").addEventListener("change", () => {
    const custom = $("fRange").value === "custom";
    $("fFrom").style.display = custom ? "" : "none";
    $("fTo").style.display   = custom ? "" : "none";
    if (!custom) onFilterChange();
  });


  /* ── Init ── */

  async function init() {
    try {
      if (role === "class_teacher") await initClassTeacher();
      else                          await initSubjectTeacher();
    } catch (err) {
      console.error("Init error:", err);
      $("tBody").innerHTML = `<tr><td class="empty">Failed to load: ${err.message}</td></tr>`;
    }
  }

  async function initClassTeacher() {
    const deptId = localStorage.getItem("departmentId");
    dept = await fetch(`${API}/departments/${deptId}`, { headers: hdrs }).then(r => r.json());

    $("roleStrip").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Department</span>
      <span class="val">${dept.name} (${dept.code})</span>
      <span class="sep">·</span>
      <span class="label">Access</span>
      <span class="val">All subjects, all years</span>`;

    allSubjects = await fetch(`${API}/subjects?departmentId=${deptId}`, { headers: hdrs }).then(r => r.json());

    ["fSubject", "fYear", "fSem", "fDiv"].forEach(id => $(id).style.display = "");

    $("fSubject").innerHTML = `<option value="">All Subjects</option>` +
      allSubjects.map(s =>
        `<option value="${s._id}">${s.name} (${s.code}) · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}</option>`
      ).join("");

    const years = [...new Set((dept.years || []).map(y => y.year))].sort();
    $("fYear").innerHTML = `<option value="">All Years</option>` +
      years.map(y => `<option value="${y}">Year ${y}</option>`).join("");

    $("fYear").addEventListener("change", () => {
      const yr   = +$("fYear").value;
      const yObj = (dept.years || []).find(y => y.year === yr);
      const divs = yObj?.divisions || (dept.years || []).flatMap(y => y.divisions);
      $("fDiv").innerHTML = `<option value="">All Divisions</option>` +
        divs.map(d => `<option value="${d._id}">Div ${d.name}</option>`).join("");
    });

    loadAttendance();
  }

  async function initSubjectTeacher() {
    allSubjects = await fetch(`${API}/subjects`, { headers: hdrs }).then(r => r.json());

    if (!allSubjects.length) {
      $("tBody").innerHTML = `<tr><td class="empty">No subjects assigned yet.</td></tr>`;
      return;
    }

    $("subBar").style.display = "";
    $("subBar").innerHTML = allSubjects.map(s =>
      `<button class="sub-pill" data-id="${s._id}" onclick="selectSubject('${s._id}')">
        ${s.code} · Div ${s.divisionName} · Y${s.year}S${s.semester} · ${s.type}
      </button>`
    ).join("");

    $("roleStrip").style.display = "";
    $("roleStrip").innerHTML = `
      <span class="label">Role</span><span class="val">Subject Teacher</span>
      <span class="sep">·</span>
      <span class="label">Subjects</span>
      <span class="val">${allSubjects.length} assigned</span>`;

    selectSubject(allSubjects[0]._id);
  }

  function selectSubject(id) {
    activeSubject = allSubjects.find(s => s._id === id);
    document.querySelectorAll(".sub-pill").forEach(p =>
      p.classList.toggle("active", p.dataset.id === id)
    );
    $("roleStrip").innerHTML = `
      <span class="label">Subject</span><span class="val">${activeSubject.name} (${activeSubject.code})</span>
      <span class="sep">·</span>
      <span class="label">Division</span><span class="val">${activeSubject.divisionName}</span>
      <span class="sep">·</span>
      <span class="label">Year / Sem</span><span class="val">Y${activeSubject.year} S${activeSubject.semester}</span>
      <span class="sep">·</span>
      <span class="pill pill-${activeSubject.type === "TH" ? "blue" : "purple"}">${activeSubject.type}</span>`;
    loadAttendance();
  }


  /* ── Helpers ── */

  // Always returns an array — never throws
  async function safeFetch(url) {
    try {
      const res  = await fetch(url, { headers: hdrs });
      if (!res.ok) return [];
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    } catch {
      return [];
    }
  }


  /* ── Load Attendance ── */

  function onFilterChange() { loadAttendance(); }

  async function loadAttendance() {
    $("tBody").innerHTML = `<tr><td class="empty">Loading…</td></tr>`;
    $("tHead").innerHTML = "";
    $("summary").style.display = "none";

    try {
      const attParams  = new URLSearchParams();
      let   divisionId = null;

      if (role === "subject_teacher") {
        if (!activeSubject) return;
        attParams.set("subjectId",  activeSubject._id);
        attParams.set("divisionId", activeSubject.divisionId);
        divisionId = activeSubject.divisionId;
      } else {
        const subId = $("fSubject").value;
        const year  = $("fYear").value;
        const sem   = $("fSem").value;
        const divId = $("fDiv").value;

        if (subId) {
          attParams.set("subjectId", subId);
          const sub = allSubjects.find(s => s._id === subId);
          if (!divId && sub?.divisionId) {
            attParams.set("divisionId", sub.divisionId);
            divisionId = sub.divisionId;
          }
        }
        if (year)  attParams.set("year", year);
        if (sem)   attParams.set("semester", sem);
        if (divId) { attParams.set("divisionId", divId); divisionId = divId; }
      }

      const range = $("fRange").value;
      if (range === "custom") {
        const from = $("fFrom").value, to = $("fTo").value;
        if (from) attParams.set("from", from);
        if (to)   attParams.set("to",   to);
      } else {
        attParams.set("range", range);
      }

      // Both fetches are safe — roster returns [] if divisionId is null or request fails
      const rosterUrl = divisionId ? `${API}/students?divisionId=${divisionId}` : null;

      const [data, roster] = await Promise.all([
        safeFetch(`${API}/attendance?${attParams}`),
        rosterUrl ? safeFetch(rosterUrl) : Promise.resolve([]),
      ]);

      if (!data.length && !roster.length) {
        $("tBody").innerHTML = `<tr><td class="empty">No records found for this selection.</td></tr>`;
        return;
      }

      renderTable(data, roster);

    } catch (err) {
      console.error("loadAttendance error:", err);
      $("tBody").innerHTML = `<tr><td class="empty">Error: ${err.message}</td></tr>`;
    }
  }


  /* ── Render Table ── */

  function renderTable(records, roster) {
    const thRecords = records.filter(r => r.lectureType === "TH");
    const prRecords = records.filter(r => r.lectureType === "PR");
    const hasTH     = thRecords.length > 0;
    const hasPR     = prRecords.length > 0;

    const thDates = [...new Set(thRecords.map(r => r.date))].sort();
    const prDates = [...new Set(prRecords.map(r => r.date))].sort();

    // Seed from roster first — all uploaded students appear even with zero attendance
    const students = {};
    (roster || []).forEach(s => {
      students[String(s.roll)] = {
        roll:    String(s.roll),
        name:    s.name,
        thDates: new Set(),
        prDates: new Set(),
      };
    });

    // Overlay attendance records — also catches QR-only students not in roster
    records.forEach(r => {
      if (!students[r.studentRoll]) {
        students[r.studentRoll] = {
          roll:    r.studentRoll,
          name:    r.studentName,
          thDates: new Set(),
          prDates: new Set(),
        };
      }
      if (r.lectureType === "TH") students[r.studentRoll].thDates.add(r.date);
      else                        students[r.studentRoll].prDates.add(r.date);
    });

    const rows = Object.values(students).sort((a, b) => +a.roll - +b.roll);

    currentRows    = rows;
    currentThDates = thDates;
    currentPrDates = prDates;
    currentHasTH   = hasTH;
    currentHasPR   = hasPR;

    // Roster exists but no lectures taken yet
    if (!hasTH && !hasPR) {
      $("tHead").innerHTML = `<tr><th>Roll</th><th>Name</th><th style="color:var(--ink-muted);font-weight:400;font-size:13px;">No lectures recorded yet</th></tr>`;
      $("tBody").innerHTML = rows.map(s =>
        `<tr>
          <td class="td-roll">${s.roll}</td>
          <td>${s.name}</td>
          <td style="color:var(--ink-faint);text-align:center;">—</td>
        </tr>`
      ).join("");
      renderSummary();
      return;
    }

    // Build headers
    let headerHTML = "<tr><th>Roll</th><th>Name</th>";
    if (hasTH) headerHTML += `<th colspan="${thDates.length}" class="th-group-th">TH — Theory</th>`;
    if (hasPR) headerHTML += `<th colspan="${prDates.length}" class="th-group-pr">PR — Practical</th>`;
    if (hasTH) headerHTML += `<th class="th-group-th">TH %</th>`;
    if (hasPR) headerHTML += `<th class="th-group-pr">PR %</th>`;
    if (hasTH && hasPR) headerHTML += "<th>Overall %</th>";
    headerHTML += "</tr>";

    let dateRowHTML = "<tr><th></th><th></th>";
    if (hasTH) dateRowHTML += thDates.map(d => `<th class="th-date-th">${fmtDate(d)}</th>`).join("");
    if (hasPR) dateRowHTML += prDates.map(d => `<th class="th-date-pr">${fmtDate(d)}</th>`).join("");
    if (hasTH) dateRowHTML += "<th></th>";
    if (hasPR) dateRowHTML += "<th></th>";
    if (hasTH && hasPR) dateRowHTML += "<th></th>";
    dateRowHTML += "</tr>";

    $("tHead").innerHTML = headerHTML + dateRowHTML;

    const editSubjectId = activeSubject?._id || $("fSubject").value;

    $("tBody").innerHTML = rows.map(s => {
      const thAtt      = thDates.filter(d => s.thDates.has(d)).length;
      const prAtt      = prDates.filter(d => s.prDates.has(d)).length;
      const thPct      = hasTH && thDates.length ? Math.round((thAtt / thDates.length) * 100) : null;
      const prPct      = hasPR && prDates.length ? Math.round((prAtt / prDates.length) * 100) : null;
      const totLec     = thDates.length + prDates.length;
      const overallPct = totLec ? Math.round(((thAtt + prAtt) / totLec) * 100) : null;
      const safeName   = encodeURIComponent(s.name);

      const attCell = (d, type, present) =>
        `<td class="${present ? "P" : "A"} att-cell"
          data-roll="${s.roll}"
          data-name="${safeName}"
          data-date="${d}"
          data-type="${type}"
          data-subject="${editSubjectId}"
          onclick="toggleAttendance(this)"
          title="Click to toggle"
        >${present ? "P" : "A"}</td>`;

      let html = `<td class="td-roll">${s.roll}</td><td>${s.name}</td>`;
      if (hasTH) html += thDates.map(d => attCell(d, "TH", s.thDates.has(d))).join("");
      if (hasPR) html += prDates.map(d => attCell(d, "PR", s.prDates.has(d))).join("");
      if (hasTH) html += `<td class="${pctCls(thPct)}" data-th-pct="${s.roll}">${thPct !== null ? thPct + "%" : "N/A"}</td>`;
      if (hasPR) html += `<td class="${pctCls(prPct)}" data-pr-pct="${s.roll}">${prPct !== null ? prPct + "%" : "N/A"}</td>`;
      if (hasTH && hasPR) html += `<td class="${pctCls(overallPct)}" data-ov-pct="${s.roll}">${overallPct !== null ? overallPct + "%" : "N/A"}</td>`;

      return `<tr>${html}</tr>`;
    }).join("");

    renderSummary();
  }


  /* ── Toggle Attendance ── */

  async function toggleAttendance(cell) {
    if (cell.dataset.saving) return;

    const roll        = cell.dataset.roll;
    const name        = decodeURIComponent(cell.dataset.name);
    const date        = cell.dataset.date;
    const lectureType = cell.dataset.type;
    const subjectId   = cell.dataset.subject;
    const isPresent   = cell.classList.contains("P");
    const newPresent  = !isPresent;

    cell.dataset.saving = "1";
    cell.classList.add("att-saving");
    cell.classList.replace(isPresent ? "P" : "A", newPresent ? "P" : "A");
    cell.textContent = newPresent ? "P" : "A";

    const student = currentRows.find(r => r.roll === roll);
    if (student) {
      const dateSet = lectureType === "TH" ? student.thDates : student.prDates;
      newPresent ? dateSet.add(date) : dateSet.delete(date);
    }

    try {
      const res = await fetch(`${API}/attendance`, {
        method:  "PATCH",
        headers: hdrs,
        body:    JSON.stringify({ studentRoll: roll, studentName: name, subjectId, date, lectureType, present: newPresent }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || res.statusText);
      }
      updateRowStats(roll);
      renderSummary();
      showToast(`${roll} · ${fmtDate(date)} (${lectureType}) → ${newPresent ? "Present" : "Absent"}`, "ok");
    } catch (err) {
      cell.classList.replace(newPresent ? "P" : "A", isPresent ? "P" : "A");
      cell.textContent = isPresent ? "P" : "A";
      if (student) {
        const dateSet = lectureType === "TH" ? student.thDates : student.prDates;
        isPresent ? dateSet.add(date) : dateSet.delete(date);
      }
      showToast(`Failed to update: ${err.message}`, "err");
    } finally {
      delete cell.dataset.saving;
      cell.classList.remove("att-saving");
    }
  }

  function updateRowStats(roll) {
    const student = currentRows.find(r => r.roll === roll);
    if (!student) return;

    if (currentHasTH) {
      const thAtt     = currentThDates.filter(d => student.thDates.has(d)).length;
      const thPct     = currentThDates.length ? Math.round((thAtt / currentThDates.length) * 100) : null;
      const thPctCell = document.querySelector(`[data-th-pct="${roll}"]`);
      if (thPctCell) { thPctCell.className = pctCls(thPct); thPctCell.textContent = thPct !== null ? thPct + "%" : "N/A"; }
    }

    if (currentHasPR) {
      const prAtt     = currentPrDates.filter(d => student.prDates.has(d)).length;
      const prPct     = currentPrDates.length ? Math.round((prAtt / currentPrDates.length) * 100) : null;
      const prPctCell = document.querySelector(`[data-pr-pct="${roll}"]`);
      if (prPctCell) { prPctCell.className = pctCls(prPct); prPctCell.textContent = prPct !== null ? prPct + "%" : "N/A"; }
    }

    if (currentHasTH && currentHasPR) {
      const totLec = currentThDates.length + currentPrDates.length;
      const totAtt = currentThDates.filter(d => student.thDates.has(d)).length +
                     currentPrDates.filter(d => student.prDates.has(d)).length;
      const ovPct  = totLec ? Math.round((totAtt / totLec) * 100) : null;
      const ovCell = document.querySelector(`[data-ov-pct="${roll}"]`);
      if (ovCell) { ovCell.className = pctCls(ovPct); ovCell.textContent = ovPct !== null ? ovPct + "%" : "N/A"; }
    }
  }


  /* ── Summary ── */

  function renderSummary() {
    const { length: total } = currentRows;
    if (!total) return;

    const items = [["Students", total]];
    if (currentHasTH) items.push(["TH Lectures", currentThDates.length]);
    if (currentHasPR) items.push(["PR Lectures", currentPrDates.length]);

    $("summary").style.display = "";
    $("summary").innerHTML = items
      .map(([l, v]) => `<div class="sum-item"><span class="sum-val">${v}</span><span class="sum-lbl">${l}</span></div>`)
      .join("");
  }


  /* ── Toast ── */

  let toastTimer;
  function showToast(msg, type = "ok") {
    const t = $("saveToast");
    t.textContent   = msg;
    t.className     = `save-toast save-toast-${type}`;
    t.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.display = "none"; }, 2500);
  }


  /* ── Export ── */

  async function exportExcel() {
    const id = role === "subject_teacher" ? activeSubject?._id : $("fSubject").value;
    if (!id) return alert("Select a subject to export.");

    const range = $("fRange").value;
    const qs    = range === "custom"
      ? `?from=${$("fFrom").value}&to=${$("fTo").value}`
      : `?range=${range}`;

    try {
      const res = await fetch(`${API}/export/${id}${qs}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        return alert(`Export failed: ${err.error || res.statusText}`);
      }
      const disposition = res.headers.get("Content-Disposition") || "";
      const match       = disposition.match(/filename[^;=\n]*=['"]?([^'";\n]+)['"]?/i);
      const filename    = match ? match[1] : "attendance_export.xlsx";
      const blobUrl     = URL.createObjectURL(await res.blob());
      const a = Object.assign(document.createElement("a"), { href: blobUrl, download: filename });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(blobUrl);
    } catch (err) {
      console.error(err);
      alert("Export failed. Please try again.");
    }
  }

  init();
</script>
</body>
</html>
