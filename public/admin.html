<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid #1f1f1f;
      position: sticky; top: 0;
      background: #0d0d0d;
      z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .nav-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #555; }
    .nav-name  { font-size: 13px; color: #888; }
    .btn-logout {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; color: #444; background: none; border: 1px solid #222;
      border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .btn-logout:hover { color: #f87171; border-color: #3a1515; }

    /* ── Layout ── */
    .page { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: #111; border-radius: 10px; padding: 4px; }
    .tab {
      flex: 1; padding: 9px; text-align: center;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em;
      text-transform: uppercase; color: #555; border-radius: 7px;
      cursor: pointer; transition: all .15s; border: none; background: none;
    }
    .tab.active { background: #1e1e1e; color: #fff; }

    /* ── Section heading ── */
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .sec-title { font-size: 15px; font-weight: 400; color: #ccc; }

    /* ── Card ── */
    .card {
      background: #111; border: 1px solid #1f1f1f;
      border-radius: 10px; padding: 20px; margin-bottom: 12px;
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid.one { grid-template-columns: 1fr; }
    @media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .12em; text-transform: uppercase; color: #444;
    }
    .field input, .field select {
      padding: 10px 12px; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: #0d0d0d; color: #fff;
      border: 1px solid #2a2a2a; border-radius: 7px; outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-color: #444; }
    .field input::placeholder { color: #333; }
    .field select option { background: #1a1a1a; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 18px; border-radius: 7px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn-primary { background: #fff; color: #0d0d0d; }
    .btn-primary:hover { background: #d8d8d8; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm {
      padding: 6px 12px; font-size: 11px; font-family: 'DM Mono', monospace;
      letter-spacing: .06em; border-radius: 6px; cursor: pointer; border: none;
    }
    .btn-danger { background: #1f0d0d; color: #f87171; border: 1px solid #3a1515; }
    .btn-danger:hover { background: #2a1010; }
    .btn-ghost { background: #161616; color: #888; border: 1px solid #2a2a2a; }
    .btn-ghost:hover { color: #fff; border-color: #444; }
    .btn-add {
      display: flex; align-items: center; gap: 6px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .1em; text-transform: uppercase;
      background: #161616; color: #888; border: 1px solid #2a2a2a;
      border-radius: 7px; padding: 8px 14px; cursor: pointer;
      transition: all .15s;
    }
    .btn-add:hover { color: #fff; border-color: #444; }

    /* ── Table ── */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .1em; text-transform: uppercase; color: #444;
      text-align: left; padding: 10px 12px; border-bottom: 1px solid #1f1f1f;
    }
    .tbl td { padding: 12px 12px; font-size: 13px; color: #bbb; border-bottom: 1px solid #161616; vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #111; }

    /* ── Badge ── */
    .pill {
      display: inline-block; padding: 2px 8px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      border-radius: 4px; letter-spacing: .06em;
    }
    .pill-green { background: #0a1f12; color: #4ade80; border: 1px solid #173325; }
    .pill-yellow { background: #1a1400; color: #fbbf24; border: 1px solid #3d2e00; }
    .pill-blue { background: #0d1520; color: #60a5fa; border: 1px solid #1a3050; }

    /* ── Year builder ── */
    .year-block { border: 1px solid #1f1f1f; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .year-block-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .year-label { font-family: 'DM Mono', monospace; font-size: 11px; color: #888; letter-spacing: .1em; }
    .div-row { display: grid; grid-template-columns: 1fr 100px 100px auto; gap: 8px; align-items: end; margin-bottom: 8px; }

    /* ── Msg ── */
    .msg { padding: 10px 14px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.6; margin-top: 12px; }
    .ok  { color: #4ade80; background: #0a1a10; border: 1px solid #173325; }
    .err { color: #f87171; background: #1a0a0a; border: 1px solid #3a1515; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 40px; color: #333; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; }

    /* ── Modal overlay ── */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .overlay.open { display:flex; }
    .modal { background:#161616; border:1px solid #2a2a2a; border-radius:12px; padding:28px; width:100%; max-width:420px; animation: up .25s ease; }
    @keyframes up { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-title { font-size:16px; font-weight:400; }
    .modal-close { background:none; border:none; color:#555; font-size:18px; cursor:pointer; line-height:1; }
    .modal-close:hover { color:#fff; }

    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-toggle {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:#555; cursor:pointer; font-size:13px;
    }
    .pw-toggle:hover { color:#fff; }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-left">
    <div class="nav-dot"></div>
    <span class="nav-title">Admin</span>
  </div>
  <span class="nav-name" id="navName"></span>
  <button class="btn-logout" onclick="logout()">Sign out</button>
</nav>

<div class="page">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('departments')">Departments</button>
    <button class="tab"        onclick="switchTab('hods')">HODs</button>
  </div>

  <!-- ════ DEPARTMENTS TAB ════ -->
  <div id="tab-departments">
    <div class="sec-head">
      <span class="sec-title">Departments</span>
      <button class="btn-add" onclick="openDeptModal()">+ Add Department</button>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr>
            <th>Name</th><th>Code</th><th>HOD</th><th>Years / Divisions</th><th></th>
          </tr>
        </thead>
        <tbody id="deptBody">
          <tr><td colspan="5"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ════ HODs TAB ════ -->
  <div id="tab-hods" style="display:none;">
    <div class="sec-head">
      <span class="sec-title">HODs</span>
      <button class="btn-add" onclick="openHodModal()">+ Add HOD</button>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Department</th><th></th></tr>
        </thead>
        <tbody id="hodBody">
          <tr><td colspan="4"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ════ ADD DEPARTMENT MODAL ════ -->
<div class="overlay" id="deptModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add Department</span>
      <button class="modal-close" onclick="closeModal('deptModal')">✕</button>
    </div>

    <div class="form-grid" style="margin-bottom:12px;">
      <div class="field">
        <label>Department Name</label>
        <input type="text" id="deptName" placeholder="e.g. Computer Science" />
      </div>
      <div class="field">
        <label>Code</label>
        <input type="text" id="deptCode" placeholder="e.g. CS" />
      </div>
    </div>

    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#444;">Years & Divisions</label>
        <button class="btn-sm btn-ghost" onclick="addYearBlock()">+ Year</button>
      </div>
      <div id="yearsBuilder"></div>
    </div>

    <div id="deptMsg"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="saveDept()">Save Department</button>
  </div>
</div>

<!-- ════ ADD HOD MODAL ════ -->
<div class="overlay" id="hodModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add HOD</span>
      <button class="modal-close" onclick="closeModal('hodModal')">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="hodName" placeholder="e.g. Dr. Ramesh Patil" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="hodEmail" placeholder="hod@college.edu" />
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="hodPass" placeholder="Set a password to share" />
          <button class="pw-toggle" onclick="togglePw('hodPass',this)">Show</button>
        </div>
      </div>
      <div class="field">
        <label>Department</label>
        <select id="hodDept">
          <option value="">— Select department —</option>
        </select>
      </div>
    </div>

    <div id="hodMsg"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="saveHod()">Create HOD Account</button>
  </div>
</div>

<script>
  const API   = "http://localhost:3000";
  const token = localStorage.getItem("token");

  // Auth guard
  if (!token || localStorage.getItem("role") !== "admin") {
    window.location.href = "login.html";
  }

  document.getElementById("navName").textContent = localStorage.getItem("name") || "Admin";

  const hdrs = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  /* ── Helpers ── */
  function $(id) { return document.getElementById(id); }
  function showMsg(elId, text, type) {
    $(elId).innerHTML = `<div class="msg ${type}">${text}</div>`;
  }
  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }

  /* ── Tabs ── */
  function switchTab(name) {
    ["departments","hods"].forEach(t => {
      $(`tab-${t}`).style.display = t === name ? "" : "none";
    });
    document.querySelectorAll(".tab").forEach((btn, i) => {
      btn.classList.toggle("active", ["departments","hods"][i] === name);
    });
    if (name === "hods") loadHods();
  }

  /* ── Modal helpers ── */
  function openModal(id)  { $(id).classList.add("open"); }
  function closeModal(id) { $(id).classList.remove("open"); }
  function togglePw(inputId, btn) {
    const inp = $(inputId);
    const show = inp.type === "password";
    inp.type = show ? "text" : "password";
    btn.textContent = show ? "Hide" : "Show";
  }

  // Close modal on backdrop click
  document.querySelectorAll(".overlay").forEach(el => {
    el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); });
  });

  /* ════════════════════════════════
     DEPARTMENTS
  ════════════════════════════════ */

  let depts = [];

  async function loadDepts() {
    const res  = await fetch(`${API}/departments`, { headers: hdrs });
    depts      = await res.json();
    renderDepts();
    populateDeptSelect();
  }

  function renderDepts() {
    const tbody = $("deptBody");
    if (!depts.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty">No departments yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = depts.map(d => {
      const yearSummary = (d.years || []).map(y =>
        `Y${y.year}: ${(y.divisions || []).map(dv => `Div ${dv.name} (${dv.rollRange.start}–${dv.rollRange.end})`).join(", ")}`
      ).join(" | ") || "—";
      const hod = d.hodId ? `<span class="pill pill-green">${d.hodId.name}</span>` : `<span class="pill pill-yellow">Unassigned</span>`;
      return `<tr>
        <td><strong style="color:#fff">${d.name}</strong></td>
        <td><span class="pill pill-blue">${d.code}</span></td>
        <td>${hod}</td>
        <td style="font-size:12px;color:#666;">${yearSummary}</td>
        <td><button class="btn-sm btn-danger" onclick="deleteDept('${d._id}')">Delete</button></td>
      </tr>`;
    }).join("");
  }

  function populateDeptSelect() {
    const sel = $("hodDept");
    sel.innerHTML = `<option value="">— Select department —</option>` +
      depts.map(d => `<option value="${d._id}">${d.name} (${d.code})</option>`).join("");
  }

  /* Year builder */
  const yearData = {}; // key: yearNum, value: { divs: [{name,start,end}] }

  function openDeptModal() {
    $("deptName").value = "";
    $("deptCode").value = "";
    $("deptMsg").innerHTML = "";
    $("yearsBuilder").innerHTML = "";
    Object.keys(yearData).forEach(k => delete yearData[k]);
    // Default: add year 1 block
    addYearBlock();
    openModal("deptModal");
  }

  function addYearBlock() {
    const existingYears = Array.from(document.querySelectorAll(".year-block")).map(b => +b.dataset.year);
    const next = [1,2,3].find(y => !existingYears.includes(y));
    if (!next) return;

    const block = document.createElement("div");
    block.className = "year-block";
    block.dataset.year = next;
    block.innerHTML = `
      <div class="year-block-head">
        <span class="year-label">Year ${next}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn-sm btn-ghost" onclick="addDivRow(${next})">+ Division</button>
          <button class="btn-sm btn-danger" onclick="removeYearBlock(${next})">Remove</button>
        </div>
      </div>
      <div id="divs-${next}"></div>
    `;
    $("yearsBuilder").appendChild(block);
    addDivRow(next); // start with one div row
  }

  function removeYearBlock(year) {
    document.querySelector(`.year-block[data-year="${year}"]`)?.remove();
  }

  function addDivRow(year) {
    const container = $(`divs-${year}`);
    const idx = container.querySelectorAll(".div-row").length;
    const row = document.createElement("div");
    row.className = "div-row";
    row.innerHTML = `
      <div class="field">
        ${idx === 0 ? '<label>Division</label>' : ''}
        <input type="text" placeholder="e.g. A" style="text-transform:uppercase;" maxlength="2" />
      </div>
      <div class="field">
        ${idx === 0 ? '<label>Roll Start</label>' : ''}
        <input type="number" placeholder="1" min="1" />
      </div>
      <div class="field">
        ${idx === 0 ? '<label>Roll End</label>' : ''}
        <input type="number" placeholder="63" min="1" />
      </div>
      <button class="btn-sm btn-danger" style="margin-top:${idx===0?'18px':'0'}" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
  }

  function collectYears() {
    const blocks = document.querySelectorAll(".year-block");
    const years = [];
    for (const block of blocks) {
      const year = +block.dataset.year;
      const rows = block.querySelectorAll(".div-row");
      const divisions = [];
      for (const row of rows) {
        const inputs = row.querySelectorAll("input");
        const name   = inputs[0].value.trim().toUpperCase();
        const start  = +inputs[1].value;
        const end    = +inputs[2].value;
        if (!name || !start || !end) return null; // validation fail
        divisions.push({ name, rollRange: { start, end } });
      }
      if (divisions.length) years.push({ year, divisions });
    }
    return years;
  }

  async function saveDept() {
    const name = $("deptName").value.trim();
    const code = $("deptCode").value.trim().toUpperCase();
    if (!name || !code) return showMsg("deptMsg", "Name and code are required.", "err");

    const years = collectYears();
    if (years === null) return showMsg("deptMsg", "Fill all division fields (name, roll start, roll end).", "err");

    const res  = await fetch(`${API}/departments`, {
      method: "POST", headers: hdrs,
      body: JSON.stringify({ name, code, years })
    });
    const data = await res.json();
    if (!res.ok) return showMsg("deptMsg", data.error, "err");

    showMsg("deptMsg", `Department "${data.name}" created.`, "ok");
    setTimeout(() => { closeModal("deptModal"); loadDepts(); }, 1000);
  }

  async function deleteDept(id) {
    if (!confirm("Delete this department? This cannot be undone.")) return;
    await fetch(`${API}/departments/${id}`, { method: "DELETE", headers: hdrs });
    loadDepts();
  }

  /* ════════════════════════════════
     HODs
  ════════════════════════════════ */

  async function loadHods() {
    const res  = await fetch(`${API}/users?role=hod`, { headers: hdrs });
    const hods = await res.json();
    renderHods(hods);
  }

  function renderHods(hods) {
    const tbody = $("hodBody");
    if (!hods.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty">No HODs yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = hods.map(h => {
      const dept = depts.find(d => d._id === (h.departmentId?._id || h.departmentId));
      return `<tr>
        <td><strong style="color:#fff">${h.name}</strong></td>
        <td style="color:#666;font-size:12px;">${h.email}</td>
        <td>${dept ? `<span class="pill pill-blue">${dept.name}</span>` : `<span class="pill pill-yellow">Unassigned</span>`}</td>
        <td><button class="btn-sm btn-danger" onclick="deleteHod('${h._id}')">Delete</button></td>
      </tr>`;
    }).join("");
  }

  function openHodModal() {
    ["hodName","hodEmail","hodPass"].forEach(id => $(id).value = "");
    $("hodDept").value = "";
    $("hodMsg").innerHTML = "";
    openModal("hodModal");
  }

  async function saveHod() {
    const name     = $("hodName").value.trim();
    const email    = $("hodEmail").value.trim();
    const password = $("hodPass").value;
    const deptId   = $("hodDept").value;

    if (!name || !email || !password) return showMsg("hodMsg", "Name, email and password are required.", "err");
    if (password.length < 6)         return showMsg("hodMsg", "Password must be at least 6 characters.", "err");
    if (!deptId)                     return showMsg("hodMsg", "Please select a department.", "err");

    const res  = await fetch(`${API}/users`, {
      method: "POST", headers: hdrs,
      body: JSON.stringify({ name, email, password, role: "hod", departmentId: deptId })
    });
    const data = await res.json();
    if (!res.ok) return showMsg("hodMsg", data.error, "err");

    // Also update the department's hodId
    await fetch(`${API}/departments/${deptId}`, {
      method: "PATCH", headers: hdrs,
      body: JSON.stringify({ hodId: data._id })
    });

    showMsg("hodMsg", `HOD account created for ${name}.`, "ok");
    setTimeout(() => { closeModal("hodModal"); loadDepts(); loadHods(); }, 1000);
  }

  async function deleteHod(id) {
    if (!confirm("Delete this HOD account?")) return;
    await fetch(`${API}/users/${id}`, { method: "DELETE", headers: hdrs });
    loadHods();
  }

  /* ── Init ── */
  loadDepts();
</script>
</body>
</html>
